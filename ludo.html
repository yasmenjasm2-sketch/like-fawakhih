<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ميدان معركة اللودو الحية | تطوير حمزة الحماده</title>
    <style>
        :root {
            --bg-color: #080810;
            --panel-bg: rgba(22, 22, 40, 0.9);
            --secondary-neon: #00f0ff;
            --ludo-red: #ff2a5f;
            --ludo-green: #10b981;
            --ludo-yellow: #ffd700;
            --ludo-blue: #00f0ff;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #150d2a 0%, #05050b 100%);
            color: #fff;
            text-align: center;
            margin: 0; padding: 15px;
            min-height: 100dvh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .ludo-container {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0, 240, 255, 0.15);
            max-width: 450px; width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 24px; margin-top: 0; margin-bottom: 5px;
            background: linear-gradient(90deg, #ff2a5f, #ffd700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #ludo-grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%; max-width: 380px; aspect-ratio: 1;
            background: #111; gap: 2px;
            border: 6px solid #1a1a2e; border-radius: 16px;
            margin: 20px auto; overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
        }

        .ludo-cell {
            background: #222538; width: 100%; height: 100%;
            position: relative; display: flex; justify-content: center; align-items: center;
            border-radius: 2px;
        }
        
        .ludo-red-bg { background-color: var(--ludo-red) !important; }
        .ludo-green-bg { background-color: var(--ludo-green) !important; }
        .ludo-yellow-bg { background-color: var(--ludo-yellow) !important; }
        .ludo-blue-bg { background-color: var(--ludo-blue) !important; }
        .ludo-safe { font-size: 14px; filter: drop-shadow(0 0 4px #000); }
        
        .ludo-home-area {
            grid-column: span 6; grid-row: span 6;
            display: flex; justify-content: center; align-items: center;
            background: #1a1c2e; border: 1px solid #2d325a;
        }
        .ludo-home-inner {
            width: 80%; height: 80%; border-radius: 12px;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 12px; padding: 12px; background: rgba(0,0,0,0.3);
            box-shadow: inset 0 0 12px rgba(0,0,0,0.6);
        }
        .ludo-token-slot { width: 100%; height: 100%; border-radius: 50%; background: rgba(255,255,255,0.05); }
        
        .ludo-token {
            width: 85%; height: 85%; border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6), inset 0 -3px 6px rgba(0,0,0,0.3);
            position: absolute; z-index: 100; border: 2px solid white;
            cursor: pointer;
        }
        .token-red { background: radial-gradient(circle, #ff6b8b, var(--ludo-red)); }
        .token-green { background: radial-gradient(circle, #52e5b1, var(--ludo-green)); }
        .token-yellow { background: radial-gradient(circle, #fff07c, var(--ludo-yellow)); }
        .token-blue { background: radial-gradient(circle, #7ee8fa, var(--ludo-blue)); }
        
        .dice-container {
            display: flex; justify-content: center; align-items: center;
            margin: 20px 0; gap: 20px; background: rgba(0,0,0,0.3);
            padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
        }
        .dice-box {
            width: 55px; height: 55px; background: #fff; border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: bold; color: #111;
            box-shadow: 0 6px 20px rgba(255,255,255,0.15), inset 0 -4px 8px #ccc;
            cursor: pointer; transform-style: preserve-3d;
        }
        .dice-box.rolling { animation: shake 0.4s infinite alternate; }
        @keyframes shake { 0% { transform: rotate(0deg) scale(0.9); } 100% { transform: rotate(25deg) scale(1.1); } }

        button.exit-btn {
            background: linear-gradient(90deg, #ff2a5f, #b5002e); color: white;
            border: none; padding: 12px 24px; font-size: 14px; font-weight: bold;
            border-radius: 10px; cursor: pointer; width: 100%;
            box-shadow: 0 4px 12px rgba(255, 42, 95, 0.3);
        }
        button:active { transform: scale(0.98); }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="ludo-container">
        <h1>ميدان معركة اللودو الحية</h1>
        <div id="ludo-role-text" style="font-size: 13px; color: #aaa; margin-bottom: 5px;">أنت: جاري التحقق...</div>
        <div id="ludo-status-text" style="color: var(--secondary-neon); font-size: 16px; font-weight: bold; margin-bottom: 15px;">جاري الاتصال بالمشرف الدولي...</div>
        
        <div id="ludo-grid"></div>
        
        <div class="dice-container">
            <div id="ludo-dice" class="dice-box" onclick="rollLudoDice()">🎲</div>
            <div style="text-align: right; margin-right: 10px;">
                <div style="font-size: 11px; color: #aaa;">رقم الزهر الأخير:</div>
                <div id="dice-result-text" style="font-size: 24px; font-weight: 900; color: var(--ludo-yellow);">0</div>
            </div>
        </div>
        
        <button onclick="exitGame()" class="exit-btn">انسحاب والعودة للمنصة</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDr0kbQDE90hhEMohV6X1b4ndu4L7uZz24",
            projectId: "mehamzaalanat",
            databaseURL: "https://mehamzaalanat-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "mehamzaalanat.firebasestorage.app",
            appId: "1:10248497310:android:bc2b88983738827f15338f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // التقاط بيانات التحكم من خلال الروابط المشفرة المتصلة بالملف الرئيسي
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId');
        const myRole = urlParams.get('role'); // Red أو Yellow
        const currentUserId = urlParams.get('uid');
        const currentUsername = urlParams.get('username');
        const gameType = urlParams.get('type') || 'ludo2';

        window.onload = () => {
            if(!gameId || !myRole) {
                alert("خطأ أمنّي: لم يتم العثور على مفتاح الغرفة!"); window.location.href = 'index.html'; return;
            }
            renderLudoBoard();
            startLudoOnline();
        };

        function renderLudoBoard() {
            const grid = document.getElementById('ludo-grid');
            grid.innerHTML = '';
            
            for(let row = 0; row < 15; row++) {
                for(let col = 0; col < 15; col++) {
                    if(row < 6 && col < 6) { if(row===0 && col===0) addHomeArea(grid, 'green', 1, 1); continue; }
                    if(row < 6 && col > 8) { if(row===0 && col===9) addHomeArea(grid, 'yellow', 1, 10); continue; }
                    if(row > 8 && col < 6) { if(row===9 && col===0) addHomeArea(grid, 'red', 10, 1); continue; }
                    if(row > 8 && col > 8) { if(row===9 && col===9) addHomeArea(grid, 'blue', 10, 10); continue; }
                    
                    const cell = document.createElement('div');
                    cell.className = 'ludo-cell';
                    
                    if(row === 7 && col >= 1 && col <= 5) cell.classList.add('ludo-green-bg');
                    else if(row === 7 && col >= 9 && col <= 13) cell.classList.add('ludo-blue-bg');
                    else if(col === 7 && row >= 1 && row <= 5) cell.classList.add('ludo-yellow-bg');
                    else if(col === 7 && row >= 9 && row <= 13) cell.classList.add('ludo-red-bg');
                    else if(row === 6 && col === 1) cell.classList.add('ludo-green-bg');
                    else if(row === 1 && col === 8) cell.classList.add('ludo-yellow-bg');
                    else if(row === 8 && col === 13) cell.classList.add('ludo-blue-bg');
                    else if(row === 13 && col === 6) cell.classList.add('ludo-red-bg');
                    
                    if(row >= 6 && row <= 8 && col >= 6 && col <= 8) {
                        cell.style.background = 'linear-gradient(45deg, var(--ludo-red) 25%, var(--ludo-blue) 25%, var(--ludo-blue) 50%, var(--ludo-yellow) 50%, var(--ludo-yellow) 75%, var(--ludo-green) 75%)';
                    }

                    if((row===6 && col===2) || (row===2 && col===6) || (row===8 && col===12) || (row===12 && col===8)) {
                        cell.innerHTML = '<span class="ludo-safe">⭐</span>';
                    }
                    grid.appendChild(cell);
                }
            }
            addTokensToHome('red'); addTokensToHome('yellow');
        }

        function addHomeArea(grid, color, gridRow, gridCol) {
            const area = document.createElement('div');
            area.className = `ludo-home-area ludo-${color}-bg`;
            area.style.gridRow = `${gridRow} / span 6`; area.style.gridColumn = `${gridCol} / span 6`;
            const inner = document.createElement('div');
            inner.className = 'ludo-home-inner'; inner.id = `ludo-home-${color}`;
            for(let i=0; i<4; i++) {
                const slot = document.createElement('div'); slot.className = 'ludo-token-slot'; inner.appendChild(slot);
            }
            area.appendChild(inner); grid.appendChild(area);
        }

        function addTokensToHome(color) {
            const home = document.getElementById(`ludo-home-${color}`); if(!home) return;
            const slots = home.querySelectorAll('.ludo-token-slot');
            slots.forEach(slot => {
                const token = document.createElement('div'); token.className = `ludo-token token-${color}`; slot.appendChild(token);
            });
        }

        function startLudoOnline() {
            let roleDisplay = myRole === 'Red' ? "الفريق الأحمر (المستضيف)" : "الفريق الأصفر (الضيف)";
            if(gameType === 'ludo4') roleDisplay += " [تحالف 4 لاعبين]";
            document.getElementById('ludo-role-text').innerText = `المقعد الحالي: ${roleDisplay}`;
            
            db.ref('games/' + gameId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    let currentPlayerName = data.turn === 'Red' ? data.hostName : data.guestName;
                    if (data.turn === myRole) {
                        document.getElementById('ludo-status-text').innerText = "🟢 دورك الآن لرمي الزهر!";
                        document.getElementById('ludo-status-text').style.color = "var(--ludo-green)";
                        document.getElementById('ludo-dice').style.pointerEvents = "auto";
                        document.getElementById('ludo-dice').style.opacity = "1";
                    } else {
                        document.getElementById('ludo-status-text').innerText = `⏳ انتظار حركة اللاعب: ${currentPlayerName}...`;
                        document.getElementById('ludo-status-text').style.color = "#888";
                        document.getElementById('ludo-dice').style.pointerEvents = "none";
                        document.getElementById('ludo-dice').style.opacity = "0.4";
                    }
                    if(data.dice > 0) document.getElementById('dice-result-text').innerText = data.dice;
                } else {
                    alert("🚪 تم إغلاق قاعة اللودو من الطرف الآخر."); exitGame();
                }
            });
        }

        function rollLudoDice() {
            const diceEl = document.getElementById('ludo-dice');
            diceEl.classList.add('rolling');
            
            setTimeout(() => {
                diceEl.classList.remove('rolling');
                const result = Math.floor(Math.random() * 6) + 1;
                db.ref('games/' + gameId).once('value').then((snap) => {
                    let data = snap.val();
                    if(data && data.turn === myRole) {
                        data.dice = result;
                        data.turn = myRole === 'Red' ? 'Yellow' : 'Red';
                        db.ref('games/' + gameId).update(data);
                    }
                });
            }, 500);
        }

        function exitGame() {
            if(gameId) { db.ref('games/' + gameId).remove(); db.ref('games/' + gameId).off(); }
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
