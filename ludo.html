<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لودو أونلاين | حمزة الحماده</title>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --container-bg: rgba(26, 26, 46, 0.9);
            --primary-neon: #ff2a5f;
            --secondary-neon: #00f0ff;
            --ludo-red: #ff3366;
            --ludo-green: #00e676;
            --ludo-yellow: #ffea00;
            --ludo-blue: #2979ff;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #090910 0%, #1a0f2e 100%);
            color: #fff; text-align: center; margin: 0; padding: 15px; min-height: 100dvh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .container {
            background: var(--container-bg); padding: 25px 20px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); max-width: 450px; width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(5px);
        }

        h1 { font-size: 26px; background: linear-gradient(90deg, var(--ludo-red), var(--ludo-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        button {
            background: linear-gradient(90deg, #511fff, #7000ff); color: white; border: none;
            padding: 14px 20px; margin: 8px 0; font-size: 15px; font-weight: bold;
            border-radius: 10px; cursor: pointer; width: 100%;
        }
        button.secondary-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        button.ludo-btn { background: linear-gradient(90deg, var(--ludo-green), #059669); }
        
        .room-types { display: flex; gap: 10px; margin: 20px 0; }
        .room-card {
            flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 10px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .room-card:hover, .room-card.selected { border-color: var(--secondary-neon); background: rgba(0, 240, 255, 0.1); }
        .room-card h3 { margin: 5px 0; color: var(--secondary-neon); }

        .friends-list {
            background: rgba(0,0,0,0.3); border-radius: 10px; max-height: 200px;
            overflow-y: auto; margin: 15px 0; padding: 5px; border: 1px solid rgba(255,255,255,0.05); text-align: right;
        }
        .friend-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 5px;
        }
        
        /* شكل مبسط للوحة اللودو */
        .ludo-board-visual {
            width: 100%; aspect-ratio: 1; max-width: 300px; margin: 20px auto;
            background: #fff; border-radius: 15px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; padding: 15px; position: relative;
        }
        .home { border-radius: 10px; display:flex; justify-content:center; align-items:center; }
        .home.red { background: var(--ludo-red); }
        .home.green { background: var(--ludo-green); }
        .home.yellow { background: var(--ludo-yellow); }
        .home.blue { background: var(--ludo-blue); }
        .home-inner { width: 60%; height: 60%; background: #fff; border-radius: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; }
        .token { background: inherit; border-radius: 50%; width: 100%; height: 100%; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .center-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20%; height: 20%; background: #222; border-radius: 5px; }

        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-online { background-color: #10b981; }
        .status-offline { background-color: #6b7280; }

        .toast {
            position: fixed; bottom: 20px; background: #10b981; color: white; padding: 12px 25px;
            border-radius: 30px; font-size: 14px; font-weight: bold; transition: 0.3s;
            transform: translateY(100px); opacity: 0; pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <h1>🎲 لعبة لودو أونلاين</h1>

        <section id="lobby-section" class="active">
            <h2 style="font-size: 16px; color:#ccc;">تحميل وإنشاء الغرفة</h2>
            <div class="room-types">
                <div class="room-card selected" id="mode-2" onclick="selectMode(2)">
                    <h3>لاعبين (1v1)</h3>
                    <p style="font-size: 12px; color:#888;">استدعاء صديق واحد</p>
                </div>
                <div class="room-card" id="mode-4" onclick="selectMode(4)">
                    <h3>4 لاعبين</h3>
                    <p style="font-size: 12px; color:#888;">استدعاء 3 أصدقاء</p>
                </div>
            </div>

            <h3 style="font-size: 15px; text-align:right;">استدعاء الأصدقاء:</h3>
            <div class="friends-list" id="ludo-friends">
                <div style="text-align:center;color:#666;padding:10px;">جاري التحميل...</div>
            </div>

            <button onclick="window.location.href='index.html'" class="secondary-btn">العودة للعبة X O</button>
        </section>

        <section id="waiting-section">
            <h2>جاري دعوة اللاعبين...</h2>
            <div style="margin: 20px auto; width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--secondary-neon); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            <p id="waiting-details" style="color:#aaa; font-size:14px;"></p>
            <button class="secondary-btn" onclick="cancelLudoInvite()">إلغاء</button>
        </section>

        <section id="game-section">
            <div style="display:flex; justify-content:space-between; font-size:12px; color:#aaa;">
                <span id="p1-name" style="color:var(--ludo-red);">أنت</span>
                <span id="p2-name" style="color:var(--ludo-blue);">الخصم</span>
            </div>
            
            <div class="ludo-board-visual">
                <div class="home red"><div class="home-inner"><div class="token"></div><div class="token"></div><div class="token"></div><div class="token"></div></div></div>
                <div class="home green"><div class="home-inner"><div class="token"></div><div class="token"></div><div class="token"></div><div class="token"></div></div></div>
                <div class="home blue"><div class="home-inner"><div class="token"></div><div class="token"></div><div class="token"></div><div class="token"></div></div></div>
                <div class="home yellow"><div class="home-inner"><div class="token"></div><div class="token"></div><div class="token"></div><div class="token"></div></div></div>
                <div class="center-box"></div>
            </div>
            
            <h3 id="game-status" style="color:var(--secondary-neon);">بانتظار إكتمال اللاعبين...</h3>
            <button class="secondary-btn" onclick="exitLudo()">خروج من الغرفة</button>
        </section>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDr0kbQDE90hhEMohV6X1b4ndu4L7uZz24",
            projectId: "mehamzaalanat",
            databaseURL: "https://mehamzaalanat-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "mehamzaalanat.firebasestorage.app",
            appId: "1:10248497310:android:bc2b88983738827f15338f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let uid = localStorage.getItem('xo_uid');
        let uname = localStorage.getItem('xo_username');
        let selectedMode = 2;
        let ludoGameId = null;

        if (!uid) { window.location.href = 'index.html'; } // حماية: يجب تسجيل الدخول من الملف الأول

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function showSec(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectMode(num) {
            selectedMode = num;
            document.getElementById('mode-2').classList.remove('selected');
            document.getElementById('mode-4').classList.remove('selected');
            document.getElementById(`mode-${num}`).classList.add('selected');
            showToast(`تم اختيار وضع ${num} لاعبين`);
        }

        // جلب الأصدقاء
        db.ref('users/' + uid + '/friends').on('value', snap => {
            const friends = snap.val();
            document.getElementById('ludo-friends').innerHTML = '';
            if (friends) {
                for (let fid in friends) {
                    let fName = friends[fid].name || friends[fid];
                    db.ref('users/' + fid + '/online').on('value', oSnap => {
                        let isOnline = oSnap.val() === true;
                        let statusColor = isOnline ? 'status-online' : 'status-offline';
                        
                        let html = `
                        <div class="friend-item" id="ludo-f-${fid}">
                            <span><span class="status-dot ${statusColor}"></span> ${fName}</span>
                            <button onclick="inviteLudo('${fid}', '${fName}')" style="width:auto; padding:6px 12px; margin:0; background:${isOnline?'#10b981':'#555'};">استدعاء</button>
                        </div>`;
                        
                        let ex = document.getElementById(`ludo-f-${fid}`);
                        if(ex) ex.outerHTML = html; else document.getElementById('ludo-friends').innerHTML += html;
                    });
                }
            } else {
                document.getElementById('ludo-friends').innerHTML = '<div style="color:#666;">لا يوجد أصدقاء. أضف أصدقاء من لعبة X O أولاً.</div>';
            }
        });

        // إرسال دعوة اللودو
        function inviteLudo(fid, fname) {
            db.ref('users/' + fid + '/online').once('value').then(snap => {
                if(snap.val() !== true) {
                    return showToast("⚠️ لا يمكن دعوة صديق غير متصل!");
                }
                
                ludoGameId = Math.random().toString(36).substring(2, 10);
                db.ref('ludo_games/' + ludoGameId).set({
                    host: uname, mode: selectedMode, players: { [uid]: uname }, status: 'waiting'
                });
                
                // إرسال الإشعار للصديق (يصل له في شاشة XO أو هنا)
                db.ref('users/' + fid + '/ludo_invite').set({ gameId: ludoGameId, senderName: uname });
                
                document.getElementById('waiting-details').innerText = `بانتظار قبول ${fname}...`;
                showSec('waiting-section');
                
                db.ref('ludo_games/' + ludoGameId + '/players').on('value', pSnap => {
                    let pCount = Object.keys(pSnap.val() || {}).length;
                    if(pCount === selectedMode) {
                        db.ref('ludo_games/' + ludoGameId + '/status').set('playing');
                        startLudoMatch();
                    }
                });
            });
        }

        function cancelLudoInvite() {
            if(ludoGameId) db.ref('ludo_games/' + ludoGameId).remove();
            showSec('lobby-section');
        }

        function startLudoMatch() {
            showSec('game-section');
            document.getElementById('game-status').innerText = "تم الاتصال! اللعبة قيد التطوير...";
        }

        function exitLudo() {
            if(ludoGameId) db.ref('ludo_games/' + ludoGameId).remove();
            showSec('lobby-section');
        }
    </script>
</body>
</html>
