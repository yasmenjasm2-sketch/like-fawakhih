<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ميدان معركة اللودو الاحترافية المتقدمة | تطوير حمزة الحماده</title>
    <style>
        :root {
            --bg-color: #06060c;
            --panel-bg: rgba(18, 18, 32, 0.95);
            --secondary-neon: #00f0ff;
            --ludo-red: #ff2a5f;
            --ludo-green: #10b981;
            --ludo-yellow: #ffd700;
            --ludo-blue: #00f0ff;
        }

        /* منع التحديد والنسخ نهائياً */
        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a0f3c 0%, #030307 100%);
            color: #fff;
            text-align: center;
            margin: 0; padding: 10px;
            min-height: 100dvh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        .ludo-container {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 40px rgba(0, 240, 255, 0.2);
            max-width: 500px; width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            position: relative;
        }

        .header-actions {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }

        h1 {
            font-size: 22px; margin: 0; font-weight: 900;
            background: linear-gradient(90deg, var(--ludo-red), var(--ludo-yellow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .invite-btn {
            background: linear-gradient(90deg, #10b981, #059669); color: white;
            border: none; padding: 8px 14px; font-size: 12px; font-weight: bold;
            border-radius: 10px; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        /* شبكة اللعبة المحدثة المحمية */
        #ludo-grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%; max-width: 420px; aspect-ratio: 1;
            background: #0f1015; gap: 2px;
            border: 6px solid #1a1a2e; border-radius: 18px;
            margin: 15px auto; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative;
        }

        .ludo-cell {
            background: #1f2136; width: 100%; height: 100%;
            position: relative; display: flex; justify-content: center; align-items: center;
            border-radius: 2px;
        }
        
        .ludo-red-bg { background-color: var(--ludo-red) !important; }
        .ludo-green-bg { background-color: var(--ludo-green) !important; }
        .ludo-yellow-bg { background-color: var(--ludo-yellow) !important; }
        .ludo-blue-bg { background-color: var(--ludo-blue) !important; }
        .ludo-safe { font-size: 13px; filter: drop-shadow(0 0 3px #000); position: absolute; z-index: 2; }
        
        .ludo-home-area {
            grid-column: span 6; grid-row: span 6;
            display: flex; justify-content: center; align-items: center;
            background: #151728; border: 1px solid #252a4a;
        }
        .ludo-home-inner {
            width: 85%; height: 85%; border-radius: 14px;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 8px; padding: 8px; background: rgba(0,0,0,0.4);
        }
        .ludo-token-slot { 
            width: 100%; height: 100%; border-radius: 50%; background: rgba(255,255,255,0.03); 
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        
        /* تصميم الأحجار وتأثيرات الأنيميشن الخطوي */
        .ludo-token {
            width: 85%; height: 85%; border-radius: 50%;
            box-shadow: 0 5px 10px rgba(0,0,0,0.6), inset 0 -4px 6px rgba(0,0,0,0.4);
            border: 2px solid white; cursor: pointer; z-index: 10;
            position: relative; transform: scale(1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.15s linear, left 0.15s linear;
        }
        .ludo-token.active-turn { animation: pulseGlow 1s infinite alternate; border: 2px solid #fff; }
        @keyframes pulseGlow { 0% { transform: scale(1); box-shadow: 0 0 8px #fff; } 100% { transform: scale(1.15); box-shadow: 0 0 20px var(--secondary-neon); } }

        /* تنظيم التكديس عند وقوف أكثر من حجر بمربع واحد */
        .ludo-cell .ludo-token { width: 70%; height: 70%; position: absolute; }
        .ludo-cell .ludo-token:nth-child(2) { transform: translate(-4px, -4px) scale(0.85); z-index: 11; }
        .ludo-cell .ludo-token:nth-child(3) { transform: translate(4px, 4px) scale(0.85); z-index: 12; }
        .ludo-cell .ludo-token:nth-child(4) { transform: translate(-4px, 4px) scale(0.75); z-index: 13; }

        .token-red { background: radial-gradient(circle, #ff6b9d, var(--ludo-red)); }
        .token-green { background: radial-gradient(circle, #62f2bd, var(--ludo-green)); }
        .token-yellow { background: radial-gradient(circle, #fff38a, var(--ludo-yellow)); }
        .token-blue { background: radial-gradient(circle, #8ae0ff, var(--ludo-blue)); }
        
        /* لوحة التحكم والتحضير للزهر المتعدد */
        .control-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 18px; padding: 15px; margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-around; align-items: center; gap: 10px;
        }

        .player-dice-zone {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        /* الـ 3D لرمي النرد والمزامنة الفورية للخصم */
        .scene-dice {
            width: 50px; height: 50px; perspective: 300px; cursor: pointer;
        }
        .cube-dice {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(20deg); transition: transform 0.1s linear;
        }
        .cube-face {
            position: absolute; width: 50px; height: 50px; background: #fff;
            border: 2px solid #ccc; border-radius: 10px; font-size: 24px; font-weight: bold;
            color: #111; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 10px #ddd;
        }
        .face-1  { transform: rotateY(0deg) translateZ(25px); }
        .face-2  { transform: rotateY(90deg) translateZ(25px); }
        .face-3  { transform: rotateX(90deg) translateZ(25px); }
        .face-4  { transform: rotateX(-90deg) translateZ(25px); }
        .face-5  { transform: rotateY(-90deg) translateZ(25px); }
        .face-6  { transform: rotateY(180deg) translateZ(25px); }

        .cube-dice.rolling { animation: spinCube 0.5s linear infinite; }
        @keyframes spinCube {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .pool-badge {
            background: #252a44; border: 1px solid var(--ludo-yellow);
            border-radius: 8px; padding: 4px 8px; font-size: 13px; font-weight: bold;
            color: var(--ludo-yellow); max-width: 100px; min-height: 26px;
        }

        /* نافذة الاختيار المنبثقة لاختيار عدد خطوات التحريك الاستراتيجي */
        .choice-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 5000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 14px; backdrop-filter: blur(5px);
        }
        .choice-overlay.active { display: flex; }
        .choice-box {
            background: #18192a; border: 2px solid var(--secondary-neon);
            padding: 20px; border-radius: 16px; width: 80%; max-width: 280px;
        }
        .choice-btn {
            background: linear-gradient(90deg, #511fff, var(--secondary-neon));
            color: #fff; border: none; padding: 12px; margin: 6px 0; width: 100%;
            font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 15px;
        }

        button.exit-btn {
            background: linear-gradient(90deg, var(--ludo-red), #b5002e); color: white;
            border: none; padding: 12px 24px; font-size: 14px; font-weight: bold;
            border-radius: 12px; cursor: pointer; width: 100%; margin-top: 15px;
        }
        
        #toast {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #10b981; color: white; padding: 12px 24px; border-radius: 30px;
            font-size: 14px; opacity: 0; transition: all 0.3s ease; z-index: 99999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="ludo-container">
        <div class="header-actions">
            <h1>ميدان معركة اللودو الحية</h1>
            <button class="invite-btn" onclick="copyInviteLink()">📩 دعوة صديق</button>
        </div>

        <div id="ludo-role-text" style="font-size: 13px; color: #b1b1c7; margin-bottom: 5px;">جاري الفحص المزامني...</div>
        <div id="ludo-status-text" style="color: var(--secondary-neon); font-size: 15px; font-weight: bold; margin-bottom: 10px;">تحميل قواعد اللعبة...</div>
        
        <div id="ludo-grid">
            <!-- الواجهة الاختيارية للزهر الاستراتيجي المتعدد -->
            <div class="choice-overlay" id="choice-overlay">
                <div class="choice-box">
                    <h4 style="margin:0 0 12px 0; font-size:15px; color:#fff;">اختر كم مربع تود التحريك:</h4>
                    <div id="choice-buttons-container"></div>
                </div>
            </div>
        </div>
        
        <div class="control-panel">
            <div class="player-dice-zone">
                <span style="font-size: 11px; color:#aaa;">زهرك الخاص</span>
                <div class="scene-dice" onclick="rollDiceProcess()">
                    <div id="my-cube" class="cube-dice">
                        <div class="cube-face face-1">1</div>
                        <div class="cube-face face-2">2</div>
                        <div class="cube-face face-3">3</div>
                        <div class="cube-face face-4">4</div>
                        <div class="cube-face face-5">5</div>
                        <div class="cube-face face-6">6</div>
                    </div>
                </div>
                <div class="pool-badge" id="my-pool-badge">فارغ</div>
            </div>

            <div class="player-dice-zone">
                <span style="font-size: 11px; color:#aaa;">زهر الخصم (مباشر)</span>
                <div class="scene-dice" style="pointer-events: none;">
                    <div id="enemy-cube" class="cube-dice">
                        <div class="cube-face face-1">1</div>
                        <div class="cube-face face-2">2</div>
                        <div class="cube-face face-3">3</div>
                        <div class="cube-face face-4">4</div>
                        <div class="cube-face face-5">5</div>
                        <div class="cube-face face-6">6</div>
                    </div>
                </div>
                <div class="pool-badge" id="enemy-pool-badge">فارغ</div>
            </div>
        </div>
        
        <button onclick="exitGame()" class="exit-btn">انسحاب والعودة للمنصة</button>
    </div>

    <div id="toast">تم النسخ</div>

    <script>
        // إغلاق النسخ واختصارات لوحة المفاتيح والزر الأيمن تماماً
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73)) {
                e.preventDefault(); return false;
            }
        });

        // هندسة المؤثرات الصوتية الفورية المحمية (Web Audio API)
        const AudioEngine = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playStep() {
                this.init(); let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
                osc.start(); osc.stop(this.ctx.currentTime + 0.08);
            },
            playDice() {
                this.init(); let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(350, this.ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.25);
                osc.start(); osc.stop(this.ctx.currentTime + 0.25);
            },
            playEat() {
                this.init(); let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination); osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.4);
                osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            },
            playWin() {
                this.init(); let now = this.ctx.currentTime;
                const playNote = (freq, start, dur) => {
                    let o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(freq, now + start);
                    g.gain.setValueAtTime(0.12, now + start); g.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
                    o.start(now + start); o.stop(now + start + dur);
                };
                playNote(523.25, 0, 0.15); playNote(659.25, 0.12, 0.15); playNote(783.99, 0.24, 0.15); playNote(1046.50, 0.36, 0.4);
            }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDr0kbQDE90hhEMohV6X1b4ndu4L7uZz24",
            projectId: "mehamzaalanat",
            databaseURL: "https://mehamzaalanat-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "mehamzaalanat.firebasestorage.app",
            appId: "1:10248497310:android:bc2b88983738827f15338f"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId');
        let myRole = urlParams.get('role'); 
        const gameType = urlParams.get('type') || 'ludo2';

        // الخرائط والإحداثيات الدولية الثابتة للودو الكلاسيكي
        const pathCoords = [
            {r:6, c:1}, {r:6, c:2}, {r:6, c:3}, {r:6, c:4}, {r:6, c:5}, {r:5, c:6}, {r:4, c:6}, {r:3, c:6}, {r:2, c:6}, {r:1, c:6}, {r:0, c:6}, {r:0, c:7}, {r:0, c:8},
            {r:1, c:8}, {r:2, c:8}, {r:3, c:8}, {r:4, c:8}, {r:5, c:8}, {r:6, c:9}, {r:6, c:10}, {r:6, c:11}, {r:6, c:12}, {r:6, c:13}, {r:6, c:14}, {r:7, c:14}, {r:8, c:14},
            {r:8, c:13}, {r:8, c:12}, {r:8, c:11}, {r:8, c:10}, {r:8, c:9}, {r:9, c:8}, {r:10, c:8}, {r:11, c:8}, {r:12, c:8}, {r:13, c:8}, {r:14, c:8}, {r:14, c:7}, {r:14, c:6},
            {r:13, c:6}, {r:12, c:6}, {r:11, c:6}, {r:10, c:6}, {r:9, c:6}, {r:8, c:5}, {r:8, c:4}, {r:8, c:3}, {r:8, c:2}, {r:8, c:1}, {r:8, c:0}, {r:7, c:0}
        ];

        const homePaths = {
            green: [{r:7, c:1}, {r:7, c:2}, {r:7, c:3}, {r:7, c:4}, {r:7, c:5}],
            yellow: [{r:1, c:7}, {r:2, c:7}, {r:3, c:7}, {r:4, c:7}, {r:5, c:7}],
            blue: [{r:7, c:13}, {r:7, c:12}, {r:7, c:11}, {r:7, c:10}, {r:7, c:9}],
            red: [{r:13, c:7}, {r:12, c:7}, {r:11, c:7}, {r:10, c:7}, {r:9, c:7}]
        };

        const startOffsets = { green: 0, yellow: 13, blue: 26, red: 39 };
        const safeZones = [0, 8, 13, 21, 26, 34, 39, 47]; 

        let gameState = null;
        let isMyTurn = false;
        let localRenderingInProgress = false; 

        // مصفوفة درجات دوران النرد الثلاثي لكل وجه
        const faceRotations = {
            1: "rotateX(0deg) rotateY(0deg)",
            2: "rotateY(-90deg)",
            3: "rotateX(-90deg)",
            4: "rotateX(90deg)",
            5: "rotateY(90deg)",
            6: "rotateY(180deg)"
        };

        window.onload = () => {
            if(!gameId || !myRole) { alert("رابط الغرفة غير صالح!"); window.location.href = 'index.html'; return; }
            myRole = myRole.toLowerCase();
            document.getElementById('ludo-role-text').innerText = `أنت تلعب باللون: ${getRoleName(myRole)} ${gameType === 'ludo4' ? '(4 لاعبين)' : '(1v1)'}`;
            
            initGameData();
            createGrid();
            listenToGameState();
        };

        function getRoleName(r) {
            const names = { red: 'الأحمر 🔴', yellow: 'الأصفر 🟡', green: 'الأخضر 🟢', blue: 'الأزرق 🔵' };
            return names[r] || r;
        }

        function initGameData() {
            db.ref('games/' + gameId).once('value').then(snap => {
                let data = snap.val();
                if (!data || !data.tokens) {
                    let initialTokens = { red: [-1,-1,-1,-1], yellow: [-1,-1,-1,-1] };
                    if(gameType === 'ludo4') { initialTokens.green = [-1,-1,-1,-1]; initialTokens.blue = [-1,-1,-1,-1]; }
                    db.ref('games/' + gameId).update({
                        tokens: initialTokens, turn: 'red',
                        dicePool: [], consecutiveSixes: 0,
                        diceRolled: false, winner: ''
                    });
                }
            });
        }

        function createGrid() {
            const grid = document.getElementById('ludo-grid');
            // تأمين بقاء نافذة الاختيار
            const overlay = document.getElementById('choice-overlay');
            grid.innerHTML = ''; grid.appendChild(overlay);

            for(let row = 0; row < 15; row++) {
                for(let col = 0; col < 15; col++) {
                    if(row < 6 && col < 6) { if(row===0 && col===0) addHomeArea(grid, 'green', 1, 1); continue; }
                    if(row < 6 && col > 8) { if(row===0 && col===9) addHomeArea(grid, 'yellow', 1, 10); continue; }
                    if(row > 8 && col < 6) { if(row===9 && col===0) addHomeArea(grid, 'red', 10, 1); continue; }
                    if(row > 8 && col > 8) { if(row===9 && col===9) addHomeArea(grid, 'blue', 10, 10); continue; }
                    
                    const cell = document.createElement('div');
                    cell.className = 'ludo-cell';
                    cell.id = `cell-${row}-${col}`;
                    
                    if(row === 7 && col >= 1 && col <= 5) cell.classList.add('ludo-green-bg');
                    else if(row === 7 && col >= 9 && col <= 13) cell.classList.add('ludo-blue-bg');
                    else if(col === 7 && row >= 1 && row <= 5) cell.classList.add('ludo-yellow-bg');
                    else if(col === 7 && row >= 9 && row <= 13) cell.classList.add('ludo-red-bg');
                    
                    else if(row === 6 && col === 1) cell.classList.add('ludo-green-bg');
                    else if(row === 1 && col === 8) cell.classList.add('ludo-yellow-bg');
                    else if(row === 8 && col === 13) cell.classList.add('ludo-blue-bg');
                    else if(row === 13 && col === 6) cell.classList.add('ludo-red-bg');
                    
                    if(row >= 6 && row <= 8 && col >= 6 && col <= 8) {
                        cell.style.background = 'linear-gradient(45deg, var(--ludo-red) 25%, var(--ludo-blue) 25%, var(--ludo-blue) 50%, var(--ludo-yellow) 50%, var(--ludo-yellow) 75%, var(--ludo-green) 75%)';
                        cell.id = "center-cell";
                    }

                    if((row===6 && col===2) || (row===2 && col===6) || (row===8 && col===12) || (row===12 && col===8)) {
                        cell.innerHTML = '<span class="ludo-safe">⭐</span>';
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function addHomeArea(grid, color, gridRow, gridCol) {
            const area = document.createElement('div');
            area.className = `ludo-home-area ludo-${color}-bg`;
            area.style.gridRow = `${gridRow} / span 6`; area.style.gridColumn = `${gridCol} / span 6`;
            const inner = document.createElement('div');
            inner.className = 'ludo-home-inner'; inner.id = `home-${color}`;
            for(let i=0; i<4; i++) {
                const slot = document.createElement('div'); 
                slot.className = 'ludo-token-slot'; 
                slot.id = `home-slot-${color}-${i}`;
                inner.appendChild(slot);
            }
            area.appendChild(inner); grid.appendChild(area);
        }

        function listenToGameState() {
            db.ref('games/' + gameId).on('value', async snap => {
                const data = snap.val();
                if(!data) return;
                gameState = data;
                isMyTurn = (data.turn === myRole);
                
                updateDiceUI(data);
                
                // منع التداخل عند تفعيل الأنيميشن الخطوي
                if (!localRenderingInProgress) {
                    renderTokens(data.tokens);
                }

                if(data.winner) {
                    document.getElementById('ludo-status-text').innerText = `🏆 الفائز هو: ${getRoleName(data.winner)}`;
                }
            });
        }

        function updateDiceUI(data) {
            const statusEl = document.getElementById('ludo-status-text');
            const myPoolBadge = document.getElementById('my-pool-badge');
            const enemyPoolBadge = document.getElementById('enemy-pool-badge');

            const poolArray = data.dicePool || [];
            const poolText = poolArray.length > 0 ? poolArray.join(' + ') : 'فارغ';
            
            // تحديد وتوجيه الزهر التلقائي والمباشر للخصم واللاعب
            if(isMyTurn) {
                myPoolBadge.innerText = poolText;
                enemyPoolBadge.innerText = "فارغ";
                if(poolArray.length > 0) {
                    let lastVal = poolArray[poolArray.length - 1];
                    document.getElementById('my-cube').style.transform = faceRotations[lastVal] || faceRotations[1];
                }
                
                if(!data.diceRolled) {
                    statusEl.innerText = "🟢 دورك! ارمِ الزهر بالضغط عليه.";
                } else {
                    statusEl.innerText = "👆 اضغط على أحد أحجارك لبدء التحريك الاستراتيجي...";
                    checkIfCanMove(); 
                }
            } else {
                enemyPoolBadge.innerText = poolText;
                myPoolBadge.innerText = "فارغ";
                if(poolArray.length > 0) {
                    let lastVal = poolArray[poolArray.length - 1];
                    document.getElementById('enemy-cube').style.transform = faceRotations[lastVal] || faceRotations[1];
                }
                statusEl.innerText = `⏳ انتظار ${getRoleName(data.turn)}...`;
            }
        }

        // معالجة دوران الزهر عشوائياً وبث النتيجة المتزامنة
        function rollDiceProcess() {
            if(!isMyTurn || gameState.diceRolled) return;
            AudioEngine.playDice();

            const myCube = document.getElementById('my-cube');
            myCube.classList.add('rolling');

            // إرسال إشعار بالتحديث وقفل الرمي أثناء الحركة
            setTimeout(() => {
                myCube.classList.remove('rolling');
                const roll = Math.floor(Math.random() * 6) + 1;
                
                let currentPool = gameState.dicePool || [];
                let currentSixes = gameState.consecutiveSixes || 0;

                if(roll === 6) {
                    currentSixes++;
                    if(currentSixes === 3) {
                        // استراتيجية إلغاء الدور الصارمة عند تكرار 6 ثلاث مرات متتالية
                        db.ref('games/' + gameId).update({
                            dicePool: [],
                            consecutiveSixes: 0,
                            diceRolled: false,
                            turn: getNextTurn()
                        });
                        alert("🔴 حصلت على 6 ثلاث مرات متتالية! ينقلب الدور للاعب التالي.");
                        return;
                    }
                    currentPool.push(roll);
                    db.ref('games/' + gameId).update({
                        dicePool: currentPool,
                        consecutiveSixes: currentSixes,
                        diceRolled: false // يبقى متاحاً للرمي مجدداً
                    });
                } else {
                    currentPool.push(roll);
                    db.ref('games/' + gameId).update({
                        dicePool: currentPool,
                        consecutiveSixes: 0,
                        diceRolled: true // تم الانتهاء من حزمة الرمي والانتقال للتحريك
                    });
                }
            }, 600);
        }

        function renderTokens(tokensObj) {
            document.querySelectorAll('.ludo-token').forEach(e => e.remove());

            for (const color in tokensObj) {
                tokensObj[color].forEach((pos, index) => {
                    if (pos === 57) return; 

                    const token = document.createElement('div');
                    token.className = `ludo-token token-${color}`;
                    
                    // تلميح ضوئي للأحجار القابلة للتحريك استراتيجياً
                    if(isMyTurn && color === myRole && gameState.diceRolled && hasAnyValidMove(pos)) {
                        token.classList.add('active-turn');
                    }
                    
                    token.onclick = () => handleTokenInteraction(color, index, pos);

                    if (pos === -1) {
                        const slot = document.getElementById(`home-slot-${color}-${index}`);
                        if(slot) slot.appendChild(token);
                    } else {
                        let cellId = getCellIdFromPosition(color, pos);
                        const cell = document.getElementById(cellId);
                        if(cell) cell.appendChild(token);
                    }
                });
            }
        }

        function hasAnyValidMove(pos) {
            let pool = gameState.dicePool || [];
            return pool.some(dice => canMoveToken(pos, dice));
        }

        function getCellIdFromPosition(color, pos) {
            if(pos < 52) {
                let actualIndex = (pos + startOffsets[color]) % 52;
                let coord = pathCoords[actualIndex];
                return `cell-${coord.r}-${coord.c}`;
            } else if(pos >= 52 && pos <= 56) {
                let coord = homePaths[color][pos - 52];
                return `cell-${coord.r}-${coord.c}`;
            }
            return "center-cell";
        }

        // نظام التحريك والمفاضلة بين أرقام الزهر المتراكم
        function handleTokenInteraction(color, index, currentPos) {
            if(!isMyTurn || color !== myRole || !gameState.diceRolled) return;

            let pool = gameState.dicePool || [];
            let validChoices = pool.filter(dice => canMoveToken(currentPos, dice));

            if(validChoices.length === 0) return;

            // إذا توفر خيار واحد فقط، يتم تنفيذه فوراً، عدا ذلك تظهر لوحة الاختيار العائمة
            if(validChoices.length === 1) {
                executeStrategyMove(index, currentPos, validChoices[0]);
            } else {
                showChoiceOverlay(index, currentPos, validChoices);
            }
        }

        function showChoiceOverlay(index, currentPos, choices) {
            const overlay = document.getElementById('choice-overlay');
            const container = document.getElementById('choice-buttons-container');
            container.innerHTML = '';
            
            // إزالة تكرار الخيارات لعدم التشويش
            let uniqueChoices = [...new Set(choices)];
            
            uniqueChoices.forEach(dice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = `تحريك بمقدار (${dice}) مربعات`;
                btn.onclick = () => {
                    overlay.classList.remove('active');
                    executeStrategyMove(index, currentPos, dice);
                };
                container.appendChild(btn);
            });
            overlay.classList.add('active');
        }

        // تنفيذ خطة التحريك التدريجي والتأكد من جوائز اللعب والالتهام
        async function executeStrategyMove(index, currentPos, selectedDice) {
            localRenderingInProgress = true;
            let targetPos = currentPos === -1 ? 0 : currentPos + selectedDice;
            
            // محاكاة أنيميشن الحركة خطوة بخطوة بالوقت الحقيقي ومزامنة الصوت المربعي
            if(currentPos === -1) {
                AudioEngine.playStep();
                drawTokenAtTemporaryPosition(myRole, index, 0);
                await new Promise(r => setTimeout(r, 200));
            } else {
                for(let step = currentPos + 1; step <= targetPos; step++) {
                    AudioEngine.playStep();
                    drawTokenAtTemporaryPosition(myRole, index, step);
                    await new Promise(r => setTimeout(r, 160)); 
                }
            }

            localRenderingInProgress = false;

            let currentPool = gameState.dicePool || [];
            let idxToRemove = currentPool.indexOf(selectedDice);
            if(idxToRemove > -1) currentPool.splice(idxToRemove, 1);

            let updates = {};
            let nextTurn = myRole;
            let gotBonus = false;

            // قواعد الالتهام (الأكل) في المربعات غير الآمنة ومكافأة الدور الإضافي
            if (targetPos < 52 && targetPos >= 0) {
                let actualGlobalPos = (targetPos + startOffsets[myRole]) % 52;
                if(!safeZones.includes(actualGlobalPos)) {
                    for(const oppColor in gameState.tokens) {
                        if(oppColor !== myRole) {
                            gameState.tokens[oppColor].forEach((oppPos, oppIdx) => {
                                if(oppPos >= 0 && oppPos < 52) {
                                    let oppGlobalPos = (oppPos + startOffsets[oppColor]) % 52;
                                    if(actualGlobalPos === oppGlobalPos) {
                                        AudioEngine.playEat();
                                        updates[`tokens/${oppColor}/${oppIdx}`] = -1;
                                        gotBonus = true; 
                                        alert(`💥 تم أكل حجر اللاعب ${getRoleName(oppColor)}! حصلت على رمية مكافأة.`);
                                    }
                                }
                            });
                        }
                    }
                }
            }

            // مكافأة الوصول إلى النهاية المطلقة
            if(targetPos === 57) {
                AudioEngine.playWin();
                gotBonus = true;
                alert("🎉 مذهل! وصل حجرك للمركز النهائي وحصلت على دور إضافي مكافأة.");
            }

            updates[`tokens/${myRole}/${index}`] = targetPos;
            updates['dicePool'] = currentPool;

            // تحديد نقل الدور الاستراتيجي
            if(currentPool.length === 0) {
                if(gotBonus) {
                    updates['diceRolled'] = false; // تصفير للسماح له بالرمي مرة أخرى كمكافأة
                    updates['turn'] = myRole;
                } else {
                    updates['diceRolled'] = false;
                    updates['turn'] = getNextTurn();
                }
            } else {
                // بقاء الدور حتى يستنفذ كافة نقاط الزهر المتراكم في مخزنه
                updates['diceRolled'] = true;
                updates['turn'] = myRole;
            }

            db.ref('games/' + gameId).update(updates).then(() => checkWinCondition());
        }

        function drawTokenAtTemporaryPosition(color, index, tempPos) {
            document.querySelectorAll(`.token-${color}`)[index]?.remove();
            
            const token = document.createElement('div');
            token.className = `ludo-token token-${color}`;
            
            let cellId = getCellIdFromPosition(color, tempPos);
            const cell = document.getElementById(cellId);
            if(cell) cell.appendChild(token);
        }

        function canMoveToken(pos, dice) {
            if (pos === -1) return dice === 6; 
            if (pos + dice > 57) return false; 
            return true;
        }

        function checkIfCanMove() {
            let pool = gameState.dicePool || [];
            if(pool.length === 0) return;

            let canMoveAny = false;
            gameState.tokens[myRole].forEach(pos => {
                pool.forEach(dice => {
                    if (canMoveToken(pos, dice)) canMoveAny = true;
                });
            });

            // تمرير تلقائي ذكي للدور إذا تعذر التحريك استراتيجياً لحماية انسياب اللعب
            if(!canMoveAny) {
                setTimeout(() => {
                    db.ref('games/' + gameId).update({ 
                        dicePool: [], 
                        diceRolled: false, 
                        turn: getNextTurn() 
                    });
                }, 1400);
            }
        }

        function getNextTurn() {
            if(gameType === 'ludo2') {
                return myRole === 'red' ? 'yellow' : 'red';
            } else {
                const order = ['red', 'green', 'yellow', 'blue'];
                let idx = order.indexOf(myRole);
                return order[(idx + 1) % 4];
            }
        }

        function checkWinCondition() {
            let myTokens = gameState.tokens[myRole];
            let allFinished = myTokens.every(pos => pos === 57);
            if(allFinished) { 
                AudioEngine.playWin();
                db.ref('games/' + gameId).update({ winner: myRole }); 
            }
        }

        function copyInviteLink() {
            const baseUrl = window.location.origin + window.location.pathname.replace('ludo.html', 'index.html');
            const inviteUrl = `${baseUrl}?invite=${gameId}`;
            navigator.clipboard.writeText(inviteUrl).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = "✅ تم نسخ الرابط المباشر، أرسله للخصم!";
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        }

        function exitGame() { window.location.href = 'index.html'; }
    </script>
