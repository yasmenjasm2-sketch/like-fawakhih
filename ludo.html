<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎲 لعبة لودو أونلاين | حمزة الحماده</title>
    <style>
        :root {
            --bg: #0a0a15;
            --red: #e74c3c;
            --green: #27ae60;
            --yellow: #f1c40f;
            --blue: #3498db;
            --gold: #ffd700;
            --cell-light: #1e1e35;
            --cell-dark: #15152a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header .title {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .room-info {
            font-size: 12px;
            color: #aaa;
        }

        .header button {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .board-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            background: #111122;
            border-radius: 16px;
            border: 3px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 1px;
            padding: 2px;
        }

        .cell {
            background: var(--cell-dark);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            position: relative;
        }

        /* المسارات الملونة */
        .cell.path-red { background: #2a1015; }
        .cell.path-green { background: #102a18; }
        .cell.path-yellow { background: #2a2510; }
        .cell.path-blue { background: #101a2a; }

        /* البيوت */
        .cell.home-red { background: var(--red); border-radius: 4px; }
        .cell.home-green { background: var(--green); border-radius: 4px; }
        .cell.home-yellow { background: var(--yellow); border-radius: 4px; }
        .cell.home-blue { background: var(--blue); border-radius: 4px; }

        /* القواعد */
        .cell.base-red { background: #5a1a1a; border: 2px solid var(--red); border-radius: 6px; }
        .cell.base-green { background: #1a5a2a; border: 2px solid var(--green); border-radius: 6px; }
        .cell.base-yellow { background: #5a4a1a; border: 2px solid var(--yellow); border-radius: 6px; }
        .cell.base-blue { background: #1a2a5a; border: 2px solid var(--blue); border-radius: 6px; }

        .cell.center { background: #222; border-radius: 50%; }

        .pawn {
            width: 70%;
            height: 70%;
            border-radius: 50%;
            position: absolute;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 5;
            transition: all 0.3s ease;
        }
        .pawn.red { background: radial-gradient(circle at 40% 40%, #ff6b6b, var(--red)); }
        .pawn.green { background: radial-gradient(circle at 40% 40%, #6bff8a, var(--green)); }
        .pawn.yellow { background: radial-gradient(circle at 40% 40%, #fff06b, var(--yellow)); }
        .pawn.blue { background: radial-gradient(circle at 40% 40%, #6bb5ff, var(--blue)); }
        .pawn.selectable { animation: pulse 0.8s infinite; cursor: pointer; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        .dice-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .dice {
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
            color: #111;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        .dice:active { transform: scale(0.9); }
        .dice.rolling { animation: diceRoll 0.5s ease-out; }
        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.1); }
            50% { transform: rotate(180deg) scale(1.05); }
            75% { transform: rotate(270deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .status-bar {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin: 8px 0;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
        }

        .player-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px;
            width: 100%;
            margin-bottom: 10px;
        }

        .player-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid transparent;
            min-width: 100px;
        }
        .player-card.active-player { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .player-card .dot {
            width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
        }
        .player-card .dot.red-dot { background: var(--red); }
        .player-card .dot.green-dot { background: var(--green); }
        .player-card .dot.yellow-dot { background: var(--yellow); }
        .player-card .dot.blue-dot { background: var(--blue); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 16px;
            border: 2px solid var(--gold);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .modal h3 { color: var(--gold); margin-bottom: 15px; }
        .modal button {
            background: linear-gradient(90deg, #511fff, #7000ff);
            color: #fff; border: none; padding: 12px 20px;
            border-radius: 8px; font-size: 15px; font-weight: bold;
            cursor: pointer; width: 100%; margin: 5px 0;
        }
        .modal input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
            color: #fff; border-radius: 8px; font-size: 15px; text-align: center;
        }

        .toast {
            position: fixed; bottom: 20px; background: #10b981; color: #fff;
            padding: 10px 20px; border-radius: 30px; font-size: 14px;
            transform: translateY(100px); opacity: 0; pointer-events: none;
            z-index: 99999; transition: 0.3s ease-out;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            .dice { width: 55px; height: 55px; font-size: 24px; }
            .player-card { font-size: 11px; padding: 6px 8px; min-width: 70px; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="header">
        <span class="title">🎲 لودو أونلاين</span>
        <span class="room-info" id="room-id-display">الغرفة: ---</span>
        <button onclick="leaveGame()">🚪 خروج</button>
    </div>

    <div class="player-list" id="player-list"></div>

    <div class="board-container" id="ludo-board"></div>

    <div class="dice-area">
        <div class="dice" id="dice-btn" onclick="rollDice()">🎲</div>
        <span style="color:#aaa;font-size:13px;">انقر للنرد</span>
    </div>

    <div class="status-bar" id="status-bar">في انتظار اللاعبين...</div>

    <div id="join-modal" class="modal-overlay">
        <div class="modal">
            <h3>🎲 انضم إلى لعبة لودو</h3>
            <input type="text" id="join-room-input" placeholder="أدخل كود الغرفة">
            <button onclick="joinRoom()">انضم</button>
            <button onclick="createRoom()" style="background:linear-gradient(90deg,#10b981,#059669);">إنشاء غرفة جديدة</button>
            <p style="font-size:11px;color:#888;margin-top:8px;" id="invite-info"></p>
        </div>
    </div>

    <div id="custom-toast" class="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDr0kbQDE90hhEMohV6X1b4ndu4L7uZz24",
            projectId: "mehamzaalanat",
            databaseURL: "https://mehamzaalanat-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "mehamzaalanat.firebasestorage.app",
            appId: "1:10248497310:android:bc2b88983738827f15338f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const COLORS = ['red', 'green', 'yellow', 'blue'];
        const COLOR_HEX = { red: '#e74c3c', green: '#27ae60', yellow: '#f1c40f', blue: '#3498db' };

        let myUserId = localStorage.getItem('ludo_uid') || localStorage.getItem('xo_uid');
        let myUsername = localStorage.getItem('ludo_username') || localStorage.getItem('xo_username') || 'ضيف';
        let myGender = localStorage.getItem('ludo_gender') || 'boy';
        let myColor = null;
        let roomId = null;
        let isMyTurn = false;
        let currentDiceValue = 0;
        let hasRolled = false;
        let gameData = null;

        // تعريف مسار اللودو على اللوحة (15×15)
        const BOARD_SIZE = 15;

        function showToast(msg, color = '#10b981') {
            const t = document.getElementById('custom-toast');
            t.innerText = msg;
            t.style.background = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function generateAvatarURL(name, gender) {
            if (name === "حمزة الحماده") return "nbras.jpg";
            let svg = gender === 'boy' ?
                `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='#16162a'/><circle cx='50' cy='35' r='18' fill='#fff'/><path d='M20 100 C20 60,40 45,50 45 C60 45,80 60,80 100Z' fill='#00f0ff'/></svg>` :
                `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='#16162a'/><circle cx='50' cy='35' r='18' fill='#fff'/><path d='M20 100 C20 60,40 45,50 45 C60 45,80 60,80 100Z' fill='#ff2a5f'/></svg>`;
            return "data:image/svg+xml;base64," + btoa(svg);
        }

        // =============== نظام اللوحة ===============
        function buildBoard() {
            const board = document.getElementById('ludo-board');
            board.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.id = `cell-${r}-${c}`;
                    board.appendChild(cell);
                }
            }
        }

        function renderPawns(players) {
            // إزالة البيادق القديمة
            document.querySelectorAll('.pawn').forEach(p => p.remove());
            if (!players) return;
            Object.keys(players).forEach(pid => {
                const p = players[pid];
                if (!p || !p.pawns) return;
                p.pawns.forEach((pawn, idx) => {
                    const pos = pawn.position;
                    if (pos && pos.row !== undefined && pos.col !== undefined) {
                        const cell = document.getElementById(`cell-${pos.row}-${pos.col}`);
                        if (cell) {
                            const pawnEl = document.createElement('div');
                            pawnEl.className = `pawn ${p.color}`;
                            pawnEl.id = `pawn-${pid}-${idx}`;
                            if (p.color === myColor && isMyTurn && hasRolled && pawn.canMove) {
                                pawnEl.classList.add('selectable');
                                pawnEl.onclick = () => movePawn(pid, idx);
                            }
                            cell.appendChild(pawnEl);
                        }
                    }
                });
            });
        }

        function updatePlayerList(players, currentTurn) {
            const container = document.getElementById('player-list');
            if (!players) { container.innerHTML = ''; return; }
            let html = '';
            Object.keys(players).forEach(pid => {
                const p = players[pid];
                const isActive = pid === currentTurn;
                html += `
                <div class="player-card ${isActive ? 'active-player' : ''}">
                    <span class="dot ${p.color}-dot"></span>
                    <span>${p.name || pid}</span>
                    ${p.color === myColor ? ' (أنت)' : ''}
                </div>`;
            });
            container.innerHTML = html;
        }

        function updateStatus(players, currentTurn, diceVal) {
            const bar = document.getElementById('status-bar');
            if (!players || !currentTurn) {
                bar.innerText = 'في انتظار اللاعبين...';
                return;
            }
            const cp = players[currentTurn];
            if (cp && cp.color === myColor) {
                bar.innerText = diceVal ? `🎯 دورك! النرد: ${diceVal}` : '🎯 دورك! انقر على النرد';
                bar.style.color = '#ffd700';
            } else {
                bar.innerText = cp ? `⏳ بانتظار ${cp.name}...` : '⏳ بانتظار...';
                bar.style.color = '#aaa';
            }
        }

        function rollDice() {
            if (!isMyTurn || !roomId || !myColor) {
                showToast('ليس دورك الآن!', '#e74c3c');
                return;
            }
            if (hasRolled) {
                showToast('لقد رميت النرد بالفعل! حرك بيادقك', '#f39c12');
                return;
            }
            const diceBtn = document.getElementById('dice-btn');
            diceBtn.classList.add('rolling');
            setTimeout(() => diceBtn.classList.remove('rolling'), 500);

            const value = Math.floor(Math.random() * 6) + 1;
            currentDiceValue = value;
            hasRolled = true;
            diceBtn.innerText = value;

            db.ref('ludo_games/' + roomId + '/dice').set({
                value: value,
                rolledBy: myUserId,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // تحديث إمكانية الحركة
            updatePawnMovability(value);
            renderPawns(gameData ? gameData.players : null);
        }

        function updatePawnMovability(diceValue) {
            if (!gameData || !gameData.players || !myUserId) return;
            const myPlayerData = gameData.players[myUserId];
            if (!myPlayerData || !myPlayerData.pawns) return;
            myPlayerData.pawns.forEach(pawn => {
                pawn.canMove = false;
                if (pawn.position.row === -1 && diceValue === 6) {
                    pawn.canMove = true; // يمكن الخروج من القاعدة
                } else if (pawn.position.row >= 0 && diceValue > 0) {
                    pawn.canMove = true;
                }
            });
            // إذا لم يمكن تحريك أي بيدق والدور 6، أعط فرصة أخرى
            const anyCanMove = myPlayerData.pawns.some(p => p.canMove);
            if (!anyCanMove) {
                // لا يمكن التحرك، سيتم تمرير الدور
            }
        }

        function movePawn(playerId, pawnIdx) {
            if (!isMyTurn || !hasRolled || playerId !== myUserId) return;
            if (!gameData || !gameData.players) return;
            const myData = gameData.players[myUserId];
            if (!myData || !myData.pawns) return;
            const pawn = myData.pawns[pawnIdx];
            if (!pawn || !pawn.canMove) return;

            let newPos = { ...pawn.position };
            if (pawn.position.row === -1 && currentDiceValue === 6) {
                // اخرج من القاعدة
                newPos = getStartPosition(myColor);
            } else if (pawn.position.row >= 0) {
                // تحريك البيدق
                newPos = advancePawn(pawn.position, myColor, currentDiceValue);
            }

            if (newPos) {
                myData.pawns[pawnIdx].position = newPos;
                myData.pawns[pawnIdx].canMove = false;

                // فحص الفوز
                checkWinCondition(myData);

                // إنهاء الدور
                hasRolled = false;
                currentDiceValue = 0;
                document.getElementById('dice-btn').innerText = '🎲';
                isMyTurn = false;

                // تحديد اللاعب التالي
                const playerIds = Object.keys(gameData.players);
                const myIdx = playerIds.indexOf(myUserId);
                const nextIdx = (myIdx + 1) % playerIds.length;
                const nextPlayer = playerIds[nextIdx];

                gameData.currentTurn = nextPlayer;
                gameData.dice = { value: 0, rolledBy: null, timestamp: 0 };

                db.ref('ludo_games/' + roomId).update({
                    players: gameData.players,
                    currentTurn: nextPlayer,
                    dice: gameData.dice
                });
            }

            renderPawns(gameData.players);
        }

        function getStartPosition(color) {
            const starts = {
                red: { row: 0, col: 6 },
                green: { row: 6, col: 14 },
                yellow: { row: 14, col: 8 },
                blue: { row: 8, col: 0 }
            };
            return starts[color] || { row: 0, col: 0 };
        }

        function advancePawn(pos, color, steps) {
            // نظام مبسط لتحريك البيدق
            let { row, col } = pos;
            for (let i = 0; i < steps; i++) {
                if (row === 0 && col < 6) col++;
                else if (col === 6 && row < 6) row++;
                else if (row === 6 && col > 0) col--;
                else if (col === 0 && row > 0) row--;
                else if (row === 0 && col >= 6 && col < 14) col++;
                else if (col === 14 && row < 14) row++;
                else if (row === 14 && col > 0) col--;
                else if (col === 0 && row > 0) row--;
                else { row = Math.min(14, Math.max(0, row + 1)); }
            }
            return { row, col };
        }

        function checkWinCondition(playerData) {
            if (!playerData || !playerData.pawns) return false;
            const allHome = playerData.pawns.every(p => p.position.row === 7 && p.position.col === 7);
            if (allHome) {
                showToast(`🏆 ${playerData.name} فاز!`, '#ffd700');
                db.ref('ludo_games/' + roomId + '/winner').set(playerData.name);
                return true;
            }
            return false;
        }

        // =============== Firebase ===============
        function createRoom() {
            roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            myColor = COLORS[0]; // الأحمر يبدأ

            const initialPawns = [];
            const basePos = getBasePosition(myColor);
            for (let i = 0; i < 4; i++) {
                initialPawns.push({
                    position: { row: basePos.row, col: basePos.col + i },
                    canMove: false
                });
            }

            const gameState = {
                players: {
                    [myUserId]: {
                        name: myUsername,
                        color: myColor,
                        gender: myGender,
                        pawns: initialPawns
                    }
                },
                currentTurn: myUserId,
                dice: { value: 0, rolledBy: null, timestamp: 0 },
                winner: null,
                maxPlayers: parseInt(localStorage.getItem('ludo_playerCount') || '4'),
                status: 'waiting',
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref('ludo_games/' + roomId).set(gameState).then(() => {
                document.getElementById('join-modal').classList.add('hidden');
                document.getElementById('room-id-display').innerText = 'الغرفة: ' + roomId;
                showToast('🎲 تم إنشاء الغرفة! الكود: ' + roomId);
                listenToGame();
                isMyTurn = true;
                hasRolled = false;
                document.getElementById('dice-btn').innerText = '🎲';
            });
        }

        function joinRoom() {
            const code = document.getElementById('join-room-input').value.trim().toUpperCase();
            if (!code) { showToast('أدخل كود الغرفة!', '#e74c3c'); return; }
            db.ref('ludo_games/' + code).once('value').then(snap => {
                const data = snap.val();
                if (!data) {
                    showToast('الغرفة غير موجودة!', '#e74c3c');
                    return;
                }
                if (data.winner) {
                    showToast('انتهت اللعبة!', '#e74c3c');
                    return;
                }
                const playerCount = Object.keys(data.players || {}).length;
                if (playerCount >= (data.maxPlayers || 4)) {
                    showToast('الغرفة ممتلئة!', '#e74c3c');
                    return;
                }
                roomId = code;
                // اختيار لون غير مستخدم
                const usedColors = Object.values(data.players || {}).map(p => p.color);
                const availableColors = COLORS.filter(c => !usedColors.includes(c));
                myColor = availableColors[0] || COLORS[playerCount];

                const basePos = getBasePosition(myColor);
                const initialPawns = [];
                for (let i = 0; i < 4; i++) {
                    initialPawns.push({
                        position: { row: basePos.row, col: basePos.col + i },
                        canMove: false
                    });
                }

                const newPlayer = {
                    name: myUsername,
                    color: myColor,
                    gender: myGender,
                    pawns: initialPawns
                };

                db.ref('ludo_games/' + roomId + '/players/' + myUserId).set(newPlayer).then(() => {
                    document.getElementById('join-modal').classList.add('hidden');
                    document.getElementById('room-id-display').innerText = 'الغرفة: ' + roomId;
                    showToast('تم الانضمام!');
                    listenToGame();
                });
            });
        }

        function getBasePosition(color) {
            const bases = {
                red: { row: 0, col: 0 },
                green: { row: 0, col: 10 },
                yellow: { row: 10, col: 10 },
                blue: { row: 10, col: 0 }
            };
            return bases[color] || { row: -1, col: -1 };
        }

        function listenToGame() {
            db.ref('ludo_games/' + roomId).on('value', snap => {
                gameData = snap.val();
                if (!gameData) {
                    showToast('تم حذف الغرفة!', '#e74c3c');
                    leaveGame();
                    return;
                }
                if (gameData.winner) {
                    document.getElementById('status-bar').innerText = `🏆 الفائز: ${gameData.winner}!`;
                    document.getElementById('status-bar').style.color = '#ffd700';
                    isMyTurn = false;
                    hasRolled = true;
                }
                updatePlayerList(gameData.players, gameData.currentTurn);
                renderPawns(gameData.players);

                const diceData = gameData.dice;
                if (diceData && diceData.value > 0 && diceData.rolledBy !== myUserId) {
                    document.getElementById('dice-btn').innerText = diceData.value;
                }

                if (gameData.currentTurn === myUserId && !gameData.winner) {
                    if (diceData && diceData.rolledBy === myUserId && diceData.value > 0) {
                        currentDiceValue = diceData.value;
                        hasRolled = true;
                        document.getElementById('dice-btn').innerText = diceData.value;
                    } else if (!diceData || diceData.rolledBy !== myUserId || diceData.value === 0) {
                        isMyTurn = true;
                        hasRolled = false;
                        currentDiceValue = 0;
                        document.getElementById('dice-btn').innerText = '🎲';
                    }
                } else {
                    isMyTurn = false;
                }
                updateStatus(gameData.players, gameData.currentTurn,
                    diceData && diceData.value > 0 ? diceData.value : null);
            });
        }

        function leaveGame() {
            if (roomId && myUserId) {
                db.ref('ludo_games/' + roomId + '/players/' + myUserId).remove();
                db.ref('ludo_games/' + roomId).off();
                db.ref('ludo_games/' + roomId).once('value').then(snap => {
                    const data = snap.val();
                    if (data && data.players && Object.keys(data.players).length === 0) {
                        db.ref('ludo_games/' + roomId).remove();
                    }
                });
            }
            window.location.href = 'index.html';
        }

        // =============== التهيئة ===============
        window.onload = () => {
            buildBoard();
            if (!myUserId) {
                showToast('يرجى تسجيل الدخول أولاً من اللعبة الرئيسية', '#e74c3c');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                return;
            }
            // التحقق من وجود دعوة
            const urlParams = new URLSearchParams(window.location.search);
            const inviteCode = urlParams.get('room');
            if (inviteCode) {
                document.getElementById('join-room-input').value = inviteCode;
                document.getElementById('invite-info').innerText = 'تم اكتشاف دعوة للانضمام!';
                joinRoom();
            }
            document.getElementById('join-modal').classList.remove('hidden');
            document.getElementById('room-id-display').innerText = 'الغرفة: ---';
        };
    </script>
</body>
</html>
