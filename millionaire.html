<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>من سيربح المليون | حمزة الحماده</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #02021a;
            --bg-panel: rgba(10, 20, 60, 0.85);
            --gold: #ffbc00;
            --gold-hover: #ffd700;
            --text-light: #ffffff;
            --border-glow: rgba(255, 188, 0, 0.5);
            --btn-normal: linear-gradient(180deg, #112266 0%, #0a1133 100%);
            --btn-hover: linear-gradient(180deg, #1a3399 0%, #0f1a4c 100%);
            --btn-correct: linear-gradient(180deg, #00b050 0%, #00662a 100%);
            --btn-wrong: linear-gradient(180deg, #ff0000 0%, #990000 100%);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: all 0.3s ease; }

        body {
            margin: 0; padding: 10px;
            background: radial-gradient(circle at center, #0a1a4a 0%, var(--bg-dark) 100%);
            color: var(--text-light); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 10px; text-shadow: 0 0 20px var(--border-glow); }
        .header h1 { color: var(--gold); font-size: 26px; margin: 5px 0; }

        .game-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }

        .top-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-panel); padding: 15px; border-radius: 16px;
            border: 2px solid var(--gold); box-shadow: 0 0 15px var(--border-glow);
        }

        /* تنسيق العداد */
        .timer-circle {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle, #1a3399, #0a1133);
            border: 3px solid var(--gold);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        .timer-circle.warning {
            background: radial-gradient(circle, #ff2a5f, #990000);
            border-color: #ff2a5f; animation: pulse-timer 0.8s infinite; color: #fff;
            box-shadow: 0 0 20px #ff2a5f;
        }
        @keyframes pulse-timer { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .lifelines { display: flex; gap: 8px; flex-direction: column;}
        .lifelines-row { display: flex; gap: 8px;}
        .lifeline-btn {
            background: var(--btn-normal); border: 1px solid var(--gold); color: var(--gold);
            width: 45px; height: 35px; border-radius: 20px; font-weight: bold; font-size: 14px;
            cursor: pointer; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
        }
        .lifeline-btn:hover:not(:disabled) { background: var(--btn-hover); transform: scale(1.05); }
        .lifeline-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; color: #555; transform: none; }

        .current-prize { font-size: 22px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(255, 188, 0, 0.8); text-align: center;}

        .question-box {
            background: var(--bg-panel); border: 2px solid var(--gold); border-radius: 30px;
            padding: 20px 15px; text-align: center; font-size: 19px; font-weight: bold;
            box-shadow: 0 0 20px var(--border-glow); position: relative; line-height: 1.4;
        }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 5px; }

        .answer-btn {
            background: var(--btn-normal); border: 2px solid var(--gold); border-radius: 40px;
            color: white; padding: 12px 10px; font-size: 16px; font-weight: bold; cursor: pointer;
            position: relative; text-align: right; display: flex; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
        }
        .answer-btn span { color: var(--gold); margin-left: 10px; font-size: 18px; width: 20px; text-align: center; }
        .answer-btn:hover:not(:disabled) { background: var(--btn-hover); }
        .answer-btn.correct { background: var(--btn-correct); border-color: #00ff00; animation: pulse 0.5s infinite; }
        .answer-btn.wrong { background: var(--btn-wrong); border-color: #ff0000; }
        .answer-btn:disabled { cursor: default; }
        .answer-btn.hidden { visibility: hidden; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); } }

        .levels-container {
            background: var(--bg-panel); border: 1px solid rgba(255, 188, 0, 0.3); border-radius: 16px;
            padding: 10px; display: flex; flex-direction: column-reverse; gap: 4px; font-size: 14px; max-height: 160px; overflow-y: auto;
        }
        .level-item { display: flex; justify-content: space-between; padding: 4px 10px; border-radius: 8px; color: #aaa; }
        .level-item.active { background: var(--gold); color: #000; font-weight: bold; }
        .level-item.safe-zone { color: var(--text-light); font-weight: bold; }

        .back-btn { margin-top: 15px; background: transparent; border: 1px solid #aaa; color: #aaa; padding: 8px 20px; border-radius: 20px; cursor: pointer; text-decoration: none; display: inline-block; }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--btn-normal); border: 2px solid var(--gold);
            padding: 25px; border-radius: 20px; text-align: center; max-width: 320px; width: 90%;
        }
        .modal-content h2 { color: var(--gold); margin-top: 0; }
        .modal-btn {
            background: linear-gradient(90deg, #ffbc00, #ff8c00); border: none; color: #000;
            padding: 10px 25px; font-weight: bold; border-radius: 10px; margin-top: 15px; cursor: pointer; font-size: 16px;
        }

        @media (max-width: 480px) {
            .answers-grid { grid-template-columns: 1fr; }
            .top-panel { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>💰 من سيربح المليون 💰</h1>
    </div>

    <div class="game-container">
        <div class="top-panel">
            <div class="lifelines">
                <div class="lifelines-row">
                    <button class="lifeline-btn" id="btn-50" onclick="useFiftyFifty()" title="حذف إجابتين">50:50</button>
                    <button class="lifeline-btn" id="btn-aud" onclick="useAudience()" title="مساعدة الجمهور">👥</button>
                </div>
                <button class="lifeline-btn" id="btn-call" style="width: 100%;" onclick="useCallFriend()" title="الاتصال بصديق">📞 اتصال بـ صديق</button>
            </div>
            
            <div class="timer-circle" id="timer-display">40</div>

            <div class="current-prize">
                <span style="font-size: 12px; color: #ccc; display:block;">الرصيد</span>
                <span id="current-prize-display">0 $</span>
            </div>
        </div>

        <div class="question-box" id="question-text">جاري تحميل السؤال...</div>

        <div class="answers-grid">
            <button class="answer-btn" id="ans-0" onclick="checkAnswer(0)"><span>A</span> <div id="text-0"></div></button>
            <button class="answer-btn" id="ans-1" onclick="checkAnswer(1)"><span>B</span> <div id="text-1"></div></button>
            <button class="answer-btn" id="ans-2" onclick="checkAnswer(2)"><span>C</span> <div id="text-2"></div></button>
            <button class="answer-btn" id="ans-3" onclick="checkAnswer(3)"><span>D</span> <div id="text-3"></div></button>
        </div>

        <div class="levels-container" id="levels-list"></div>
    </div>

    <a href="index.html" class="back-btn">⬅ العودة للقائمة الرئيسية</a>

    <div class="modal" id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title">النتيجة</h2>
            <p id="modal-desc" style="font-size: 18px; margin: 20px 0;"></p>
            <button class="modal-btn" onclick="restartGame()">العب من جديد</button>
        </div>
    </div>

    <div class="modal" id="info-modal">
        <div class="modal-content">
            <h2 id="info-title">مساعدة</h2>
            <p id="info-desc" style="font-size: 16px; margin: 20px 0; line-height: 1.6;"></p>
            <button class="modal-btn" onclick="closeInfoModal()">متابعة اللعب</button>
        </div>
    </div>

            { id: 216, tier: "hard", q: "ما هو الجسيم دون الذري الذي لا يحمل أي شحنة كهربائية؟", options: ["البروتون", "الإلكترون", "النيوترون", "البوزيترون"], correct: 2 },
            { id: 217, tier: "hard", q: "أي دولة تعد أكبر منتج للكاكاو في العالم؟", options: ["البرازيل", "ساحل العاج", "إندونيسيا", "غانا"], correct: 1 },
            { id: 218, tier: "hard", q: "من هو المؤسس الفعلي للدولة الأموية؟", options: ["عمر بن عبد العزيز", "عبد الملك بن مروان", "معاوية بن أبي سفيان", "يزيد بن معاوية"], correct: 2 },
            { id: 219, tier: "hard", q: "ما هو الكوكب الذي يمتلك أطول يوم (دوران حول محوره) في النظام الشمسي؟", options: ["عطارد", "المشتري", "الزهرة", "نبتون"], correct: 2 },
            { id: 220, tier: "hard", q: "من هو العالم الذي وضع نظرية الانفجار العظيم (Big Bang) في الأصل؟", options: ["ألبرت أينشتاين", "جورج لومتر", "إدوين هابل", "ستيفن هوكينج"], correct: 1 }
        ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'tick') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } 
            else if (type === 'panic') {
                // صوت نزول تنازلي مرعب ومثير للقلق عند وصول العداد لـ 10 ثوانٍ الأخيرة
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
            else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            } 
            else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } 
            else if (type === 'ring') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.05);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        }

        const prizes = ["100", "200", "300", "500", "1,000", "2,000", "4,000", "8,000", "16,000", "32,000", "64,000", "125,000", "250,000", "500,000", "1,000,000"];

        let currentLevel = 0;
        let isWaitingForAnimation = false;
        let guaranteedPrize = "0";
        let currentQuestionData = null; 

        let timeLeft = 40;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 40;
            updateTimerUI();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                
                // استدعاء الصوت العادي أو صوت القلق التنازلي التكتيكي
                if (timeLeft <= 10 && timeLeft > 0) {
                    playSound('panic'); 
                } else if (timeLeft > 0) {
                    playSound('tick'); 
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerInterval); }
        function resumeTimer() {
            if(!isWaitingForAnimation) {
                timerInterval = setInterval(() => {
                    timeLeft--; 
                    updateTimerUI(); 
                    
                    if (timeLeft <= 10 && timeLeft > 0) {
                        playSound('panic');
                    } else if (timeLeft > 0) {
                        playSound('tick');
                    }

                    if (timeLeft <= 0) { clearInterval(timerInterval); handleTimeout(); }
                }, 1000);
            }
        }

        function updateTimerUI() {
            const timerEl = document.getElementById('timer-display');
            timerEl.innerText = timeLeft;
            if (timeLeft <= 10) timerEl.classList.add('warning');
            else timerEl.classList.remove('warning');
        }

        function handleTimeout() {
            playSound('wrong');
            isWaitingForAnimation = true;
            for(let i=0; i<4; i++) document.getElementById(`ans-${i}`).disabled = true;
            document.getElementById(`ans-${currentQuestionData.correct}`).classList.add('correct');
            
            setTimeout(() => {
                document.getElementById('modal-title').innerText = "انتهى الوقت!";
                document.getElementById('modal-desc').innerText = `لقد تأخرت في الإجابة. رصيدك المضمون: $ ${guaranteedPrize}`;
                document.getElementById('game-modal').classList.add('active');
            }, 2000);
        }

        function initGame() {
            if(typeof allQuestions === 'undefined' || allQuestions.length === 0) {
                alert("تنبيه: قاعدة بيانات الأسئلة فارغة أو غير معرفة!");
                return;
            }
            renderLevels();
            loadQuestion();
        }

        function renderLevels() {
            const list = document.getElementById('levels-list');
            list.innerHTML = "";
            for(let i = 0; i < prizes.length; i++) {
                let div = document.createElement('div');
                div.className = "level-item";
                if(i === currentLevel) div.classList.add('active');
                if(i === 4 || i === 9 || i === 14) div.classList.add('safe-zone');
                div.innerHTML = `<span>${i+1}</span> <span>$ ${prizes[i]}</span>`;
                list.appendChild(div);
            }
            setTimeout(() => {
                const activeEl = list.querySelector('.active');
                if(activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function loadQuestion() {
            isWaitingForAnimation = false;
            
            let requiredTier = "easy";
            if (currentLevel >= 5 && currentLevel <= 9) requiredTier = "medium";
            else if (currentLevel >= 10) requiredTier = "hard";

            let playedIds = JSON.parse(localStorage.getItem('millionaire_played_questions')) || [];
            let lastSeenId = parseInt(localStorage.getItem('millionaire_last_seen_id')) || null;

            // تصفية الأسئلة بحيث لا يظهر السؤال الذي تم عرضه في الجلسة السابقة مطلقاً عند الخروج والعودة
            let available = allQuestions.filter(q => q.tier === requiredTier && !playedIds.includes(q.id) && q.id !== lastSeenId);

            if (available.length === 0) {
                let tierIds = allQuestions.filter(q => q.tier === requiredTier).map(q => q.id);
                playedIds = playedIds.filter(id => !tierIds.includes(id));
                localStorage.setItem('millionaire_played_questions', JSON.stringify(playedIds));
                available = allQuestions.filter(q => q.tier === requiredTier && q.id !== lastSeenId);
                
                if (available.length === 0) {
                    available = allQuestions.filter(q => q.tier === requiredTier);
                }
            }

            // اختيار السؤال العشوائي الجديد وتحديث الذاكرة اللحظية لحظر تكراره فوراً
            currentQuestionData = available[Math.floor(Math.random() * available.length)];
            localStorage.setItem('millionaire_last_seen_id', currentQuestionData.id);

            document.getElementById('question-text').innerText = currentQuestionData.q;
            document.getElementById('current-prize-display').innerText = currentLevel > 0 ? `$ ${prizes[currentLevel-1]}` : "0 $";

            for(let i=0; i<4; i++) {
                let btn = document.getElementById(`ans-${i}`);
                btn.classList.remove('correct', 'wrong', 'hidden');
                btn.disabled = false;
                document.getElementById(`text-${i}`).innerText = currentQuestionData.options[i];
            }
            startTimer();
        }

        function checkAnswer(selectedIndex) {
            if(isWaitingForAnimation) return;
            isWaitingForAnimation = true;
            pauseTimer(); 

            let correctIndex = currentQuestionData.correct;
            let selectedBtn = document.getElementById(`ans-${selectedIndex}`);
            let correctBtn = document.getElementById(`ans-${correctIndex}`);

            for(let i=0; i<4; i++) document.getElementById(`ans-${i}`).disabled = true;

            if(selectedIndex === correctIndex) {
                let playedIds = JSON.parse(localStorage.getItem('millionaire_played_questions')) || [];
                if(!playedIds.includes(currentQuestionData.id)) {
                    playedIds.push(currentQuestionData.id);
                    localStorage.setItem('millionaire_played_questions', JSON.stringify(playedIds));
                }

                playSound('correct');
                selectedBtn.classList.add('correct');
                setTimeout(() => {
                    if(currentLevel === 4) guaranteedPrize = prizes[4];
                    if(currentLevel === 9) guaranteedPrize = prizes[9];

                    if(currentLevel === 14) winMillion();
                    else { currentLevel++; renderLevels(); loadQuestion(); }
                }, 2000);
            } else {
                playSound('wrong');
                selectedBtn.classList.add('wrong');
                correctBtn.classList.add('correct');
                setTimeout(() => { endGameLoss(); }, 2500);
            }
        }

        function useFiftyFifty() {
            if(isWaitingForAnimation) return;
            document.getElementById('btn-50').disabled = true;
            let correctIndex = currentQuestionData.correct;
            let wrongIndexes = [0, 1, 2, 3].filter(i => i !== correctIndex);
            wrongIndexes.sort(() => Math.random() - 0.5);
            document.getElementById(`ans-${wrongIndexes[0]}`).classList.add('hidden');
            document.getElementById(`ans-${wrongIndexes[1]}`).classList.add('hidden');
        }

        function useAudience() {
            if(isWaitingForAnimation) return;
            document.getElementById('btn-aud').disabled = true;
            pauseTimer();
            playSound('correct'); 
            
            let correctIndex = currentQuestionData.correct;
            let percentages = [0, 0, 0, 0];
            percentages[correctIndex] = Math.floor(Math.random() * 40) + 50; 
            let remaining = 100 - percentages[correctIndex];
            let others = [0, 1, 2, 3].filter(i => i !== correctIndex);
            percentages[others[0]] = Math.floor(Math.random() * (remaining - 5));
            remaining -= percentages[others[0]];
            percentages[others[1]] = Math.floor(Math.random() * remaining);
            percentages[others[2]] = remaining - percentages[others[1]];

            let msg = `تصويت الجمهور جاء كالتالي:<br><br>
                       A: ${percentages[0]}%<br> B: ${percentages[1]}%<br> C: ${percentages[2]}%<br> D: ${percentages[3]}%`;
            showInfoModal("رأي الجمهور", msg);
        }

        function useCallFriend() {
            if(isWaitingForAnimation) return;
            document.getElementById('btn-call').disabled = true;
            pauseTimer(); 
            playSound('ring'); 
            
            let correctIndex = currentQuestionData.correct;
            let letters = ["A", "B", "C", "D"];
            let guess = (Math.random() > 0.2) ? letters[correctIndex] : letters[Math.floor(Math.random() * 4)];
            
            setTimeout(() => {
                let msg = `📞 صديقك يقول:<br>"أهلاً يا صديقي، أعتقد وبنسبة كبيرة أن الإجابة الصحيحة هي (${guess})، بالتوفيق!"`;
                showInfoModal("مكالمة هاتفية", msg);
            }, 1000); 
        }

        function winMillion() {
            playConfetti();
            document.getElementById('modal-title').innerText = "🏆 ألف مبروك 🏆";
            document.getElementById('modal-desc').innerText = "لقد ربحت المليون دولار! أنت عبقري!";
            document.getElementById('game-modal').classList.add('active');
        }

        function endGameLoss() {
            document.getElementById('modal-title').innerText = "للأسف إجابة خاطئة!";
            document.getElementById('modal-desc').innerText = `لقد خسرت. رصيدك المضمون هو: $ ${guaranteedPrize}`;
            document.getElementById('game-modal').classList.add('active');
        }

        function showInfoModal(title, text) {
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-desc').innerHTML = text;
            document.getElementById('info-modal').classList.add('active');
        }
        
        function closeInfoModal() {
            document.getElementById('info-modal').classList.remove('active');
            resumeTimer(); 
        }

        function restartGame() {
            currentLevel = 0; guaranteedPrize = "0";
            document.getElementById('btn-50').disabled = false;
            document.getElementById('btn-aud').disabled = false;
            document.getElementById('btn-call').disabled = false;
            document.getElementById('game-modal').classList.remove('active');
            initGame();
        }

        function playConfetti() {
            var duration = 5 * 1000; var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 99999 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#ffbc00', '#ffffff', '#ff8c00'] }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#ffbc00', '#ffffff', '#ff8c00'] }));
            }, 250);
        }

        document.body.addEventListener('click', function() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });

        window.onload = () => { initGame(); };
    </script>
</body>
</html>
