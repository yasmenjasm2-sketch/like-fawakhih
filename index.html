<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة X O الاحترافية أونلاين | حمزة الحماده</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --container-bg: rgba(26, 26, 46, 0.9);
            --primary-neon: #ff2a5f;
            --secondary-neon: #00f0ff;
            --accent-glow: #7000ff;
            --text-main: #ffffff;
            --cell-bg: #16162a;
            --cell-hover: #232342;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.2s, transform 0.2s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #090910 0%, #1a0f2e 100%);
            color: var(--text-main);
            text-align: center;
            margin: 0;
            padding: 15px;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Particles Background */
        .particles-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; pointer-events: none;
        }
        .drop {
            position: absolute; bottom: -50px; width: 3px; height: 20px;
            border-radius: 50%; opacity: 0; will-change: transform, opacity;
            animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.3; }
            100% { transform: translate3d(0, -120vh, 0) scale(0.5); opacity: 0; }
        }

        /* Settings Gear Icon */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
            color: var(--secondary-neon);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }
        .settings-btn:hover svg { animation: spinGear 2s linear infinite; }
        @keyframes spinGear { 100% { transform: rotate(360deg); } }

        .container {
            background: var(--container-bg);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            position: relative;
            z-index: 10;
        }

        .user-profile-card {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px; padding: 12px; margin-bottom: 20px;
            display: none; flex-direction: column; gap: 10px;
        }
        .user-profile-card.active { display: flex; animation: fadeIn 0.3s ease-out; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .avatar-container { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1);
            border: 2px solid var(--secondary-neon); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); object-fit: cover;
        }

        .user-info { text-align: right; }
        .user-name { font-size: 16px; font-weight: bold; color: var(--secondary-neon); margin-bottom: 5px; display: flex; align-items: center; flex-wrap: wrap; gap: 5px;}
        
        .admin-badge {
            background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000;
            font-size: 11px; padding: 2px 8px; border-radius: 12px; margin-right: 8px;
            font-weight: 900; box-shadow: 0 0 8px rgba(255, 215, 0, 0.6); display: inline-flex; align-items: center; gap: 3px;
        }

        .user-id-box { 
            background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 6px; 
            font-size: 13px; color: #fff; display: flex; align-items: center; gap: 8px; justify-content: space-between;
        }
        .user-stats { font-size: 12px; color: #aaa; display: flex; gap: 10px; margin-top: 5px;}
        .user-stats span { background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px;}

        h1 {
            font-size: 28px; margin-top: 0; margin-bottom: 20px; font-weight: 900;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        h2 { font-size: 18px; margin-bottom: 15px; color: #d1d1e0; }

        input, select {
            width: 100%; padding: 14px; margin: 8px 0; background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 10px;
            font-size: 15px; text-align: center; outline: none; appearance: none;
        }
        input:focus, select:focus { border-color: var(--secondary-neon); }
        select option { background: var(--container-bg); color: white; }

        button {
            background: linear-gradient(90deg, #511fff, var(--accent-glow));
            color: white; border: none; padding: 14px 20px; margin: 8px 0;
            font-size: 15px; font-weight: bold; border-radius: 10px; cursor: pointer;
            width: 100%; box-shadow: 0 4px 15px rgba(112, 0, 255, 0.3);
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; color: #aaa; }
        button.secondary-btn { background: linear-gradient(90deg, var(--primary-neon), #d10043); box-shadow: 0 4px 15px rgba(255, 42, 95, 0.3); }
        button.ludo-btn { background: linear-gradient(90deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); font-size: 16px; }
        button.action-btn { width: auto; padding: 6px 12px; font-size: 12px; margin: 0; box-shadow: none; }
        button.small-btn { padding: 8px 15px; font-size:13px; width:auto; }

        .board {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin: 20px auto 10px auto; display: none; max-width: 300px;
        }
        .cell {
            width: 100%; aspect-ratio: 1; background-color: var(--cell-bg);
            border-radius: 12px; display: flex; justify-content: center; align-items: center;
            font-size: 40px; font-weight: 900; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .cell:active { transform: scale(0.95); }
        .cell span { animation: popIn 0.2s ease-out forwards; display: inline-block; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .cell.x { color: var(--primary-neon); text-shadow: 0 0 10px rgba(255, 42, 95, 0.5); }
        .cell.o { color: var(--secondary-neon); text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
        .cell.winning-cell { background-color: var(--accent-glow) !important; color: #fff !important; transform: scale(1.05); }

        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .list-container {
            background: rgba(0,0,0,0.3); border-radius: 10px; max-height: 200px;
            overflow-y: auto; margin-bottom: 15px; padding: 5px; border: 1px solid rgba(255,255,255,0.05);
        }
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 5px;
        }
        .list-item span { font-size: 14px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 8px;}
        .list-item img { width: 30px; height: 30px; border-radius: 50%; background: #333; object-fit: cover;}
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-online { background-color: #10b981; box-shadow: 0 0 5px #10b981; }
        .status-offline { background-color: #6b7280; }

        .toast {
            position: fixed; bottom: 20px; background: #10b981; color: white; padding: 12px 25px;
            border-radius: 30px; font-size: 14px; font-weight: bold;
            transform: translateY(100px); opacity: 0; pointer-events: none; z-index: 9999; transition: 0.3s ease-out;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 99999; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content {
            background: var(--container-bg); padding: 30px; border-radius: 20px;
            border: 1px solid var(--secondary-neon); text-align: center; width: 90%; max-width: 320px; position: relative;
        }
        .close-modal { position: absolute; top: 10px; right: 15px; color: #aaa; font-size: 20px; cursor: pointer; }
        
        .rights-text {
            margin-top: 20px; font-size: 12px; color: #888; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }
        .rights-text span { color: var(--secondary-neon); font-weight: bold; letter-spacing: 1px; }

        .scoreboard {
            display: flex; justify-content: space-around; background: rgba(0, 0, 0, 0.3);
            padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.05); align-items: flex-end;
        }
        .score-box { display: flex; flex-direction: column; align-items: center; width: 33%; }
        .score-value { font-size: 20px; font-weight: bold; }
        .score-box.x-team .score-value { color: var(--primary-neon); }
        .score-box.o-team .score-value { color: var(--secondary-neon); }
        #status-text { font-size: 16px; margin: 10px 0; font-weight: bold; color: #e2e8f0; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="particles-container" id="particles"></div>

    <div id="settingsBtn" class="settings-btn" onclick="toggleSettings()" style="display:none;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleSettings()">&times;</span>
            <h3 style="margin-top:0; color:white;">الإعدادات</h3>
            <button onclick="logout()" class="secondary-btn" style="margin-top:20px;">تسجيل خروج</button>
            <div class="rights-text">
                تطوير و برمجة: <br>
                <span>hamza elhumada</span>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>لعبة X O أونلاين</h1>

        <section id="login-section" class="active">
            <h2>تسجيل الدخول / إنشاء حساب</h2>
            <input type="text" id="username-input" placeholder="اسم المستخدم (أكثر من 5 أحرف)" maxlength="15">
            <input type="password" id="password-input" placeholder="كلمة المرور">
            <select id="gender-input" required>
                <option value="" disabled selected>-- حدد الجنس للبدء --</option>
                <option value="boy">👨 ذكر</option>
                <option value="girl">👩 أنثى</option>
            </select>
            <button onclick="authenticateUser()">دخول / تسجيل</button>
        </section>

        <section id="menu-section">
            <div class="user-profile-card" id="user-profile">
                <div class="profile-header">
                    <div class="avatar-container">
                        <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                        <div class="user-info">
                            <div class="user-name" id="display-name">جاري التحميل...</div>
                            <div class="user-stats">
                                <span id="display-played">🎮 ألعاب: 0</span>
                                <span id="display-wins">🏆 فوز: 0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="user-id-box">
                    <span>الآيدي: <strong id="display-id" style="color:var(--secondary-neon);">--------</strong></span>
                    <button onclick="copyMyID()" class="action-btn">نسخ</button>
                </div>
            </div>

            <button class="ludo-btn" onclick="goToLudo()">🎲 الدخول للعبة لودو (Ludo)</button>
            <button onclick="startLocalGame()" style="margin-top:15px;">لعب X O محلي</button>
            <button class="secondary-btn" onclick="showSection('friends-section')">اللعب X O أونلاين مع الأصدقاء</button>
        </section>

        <section id="friends-section">
            <h2>البحث وإضافة صديق</h2>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="search-id-input" placeholder="أدخل ID الصديق">
                <button class="action-btn" onclick="searchAndAddFriend()" style="width: 80px; margin: 8px 0;">إضافة</button>
            </div>

            <h3 style="font-size: 15px; text-align: right; margin-top: 15px;">طلبات الصداقة</h3>
            <div class="list-container" id="requests-list"></div>

            <h3 style="font-size: 15px; text-align: right;">قائمة الأصدقاء</h3>
            <div class="list-container" id="friends-list"></div>

            <button onclick="showSection('menu-section')" class="small-btn secondary-btn" style="width:100%;">رجوع للقائمة</button>
        </section>

        <section id="waiting-section">
            <h2 id="waiting-msg-title">بانتظار قبول صديقك للدعوة...</h2>
            <div style="margin: 20px auto; width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--secondary-neon); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            <button class="secondary-btn" onclick="cancelInvite()">إلغاء الدعوة</button>
        </section>

        <section id="game-section">
            <div class="scoreboard">
                <div class="score-box x-team">
                    <span id="label-x" style="font-size:12px; color:#ccc;">اللاعب (X)</span>
                    <span class="score-value" id="score-x">0</span>
                </div>
                <div class="score-box">
                    <span style="font-size:12px; color:#ccc;">تعادل</span>
                    <span class="score-value" id="score-ties">0</span>
                </div>
                <div class="score-box o-team">
                    <span id="label-o" style="font-size:12px; color:#ccc;">اللاعب (O)</span>
                    <span class="score-value" id="score-o">0</span>
                </div>
            </div>
            <div id="status-text">جاري التحضير...</div>
            <div class="board" id="board">
                <div class="cell" onclick="makeMove(0)"></div><div class="cell" onclick="makeMove(1)"></div><div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div><div class="cell" onclick="makeMove(4)"></div><div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div><div class="cell" onclick="makeMove(7)"></div><div class="cell" onclick="makeMove(8)"></div>
            </div>
            <button id="reset-btn" onclick="resetGame()" style="display:none; margin-top:15px;">جولة جديدة</button>
            <button onclick="exitGame()" class="secondary-btn small-btn" style="margin-top:10px; width:100%;">الخروج</button>
        </section>
    </div>

    <div class="modal-overlay" id="invite-modal">
        <div class="modal-content">
            <h3 id="invite-msg">صديقك يريد اللعب معك!</h3>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="acceptGameInvite()" style="background: #10b981;">قبول</button>
                <button onclick="rejectGameInvite()" class="secondary-btn">رفض</button>
            </div>
        </div>
    </div>

    <div id="custom-toast" class="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDr0kbQDE90hhEMohV6X1b4ndu4L7uZz24",
            projectId: "mehamzaalanat",
            databaseURL: "https://mehamzaalanat-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "mehamzaalanat.firebasestorage.app",
            appId: "1:10248497310:android:bc2b88983738827f15338f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUserData = null;
        let currentUserId = localStorage.getItem('xo_uid'); 
        let currentUsername = localStorage.getItem('xo_username');
        let gameId = ''; let myRole = ''; let isOnline = false; let gameBoard = ["", "", "", "", "", "", "", "", ""];
        let isGameOver = false; let localTurn = 'X'; let scores = { X: 0, O: 0, ties: 0 };
        let playerXName = "اللاعب (X)"; let playerOName = "اللاعب (O)";

        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#ff2a5f', '#00f0ff', '#7000ff']; 
            for (let i = 0; i < 15; i++) {
                let drop = document.createElement('div'); drop.classList.add('drop');
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
                drop.style.animationDelay = (Math.random() * 3) + 's';
                drop.style.background = `linear-gradient(180deg, ${colors[Math.floor(Math.random() * colors.length)]}, transparent)`;
                container.appendChild(drop);
            }
        }
        createParticles();

        window.onload = () => {
            if (currentUserId && currentUsername) {
                db.ref('users/' + currentUserId).once('value').then(snap => {
                    if (snap.exists()) {
                        currentUserData = snap.val();
                        loginSuccess(currentUserId, currentUsername, currentUserData);
                    } else { logout(); }
                });
            }
        };

        function showToast(message, color = "#10b981") {
            const toast = document.getElementById('custom-toast');
            toast.innerText = message; toast.style.background = color;
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function showSection(sectionId) {
            document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.getElementById('settingsBtn').style.display = (sectionId === 'login-section') ? 'none' : 'flex';
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.classList.contains('active') ? modal.classList.remove('active') : modal.classList.add('active');
        }

        function setOnlineStatus() {
            const userStatusRef = db.ref('users/' + currentUserId + '/online');
            db.ref('.info/connected').on('value', function(snapshot) {
                if (snapshot.val() == false) return;
                userStatusRef.onDisconnect().set(false).then(function() {
                    userStatusRef.set(true);
                });
            });
        }

        function authenticateUser() {
            let username = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            const gender = document.getElementById('gender-input').value;

            if (username.length <= 5) return showToast("⚠️ اليوزر يجب أن يكون أكثر من 5 أحرف!", "#ff2a5f");
            if (password.length < 4) return showToast("⚠️ كلمة المرور قصيرة جداً!", "#ff2a5f");
            if (!gender) return showToast("⚠️ يرجى تحديد الجنس!", "#ff2a5f");

            let isAdmin = (username === "حمزة الحماده" && password === "hamzagmailcom34567");
            if(isAdmin) username = "حمزة الحماده";

            db.ref('usernames/' + username).once('value').then(snap => {
                let uid = snap.exists() ? snap.val() : null;
                if (isAdmin) uid = "552";

                if (uid) {
                    db.ref('users/' + uid).once('value').then(userSnap => {
                        let data = userSnap.val();
                        if (data && data.password === password) {
                            db.ref('users/' + uid + '/gender').set(gender);
                            data.gender = gender;
                            loginSuccess(uid, username, data);
                        } else if(isAdmin) {
                            createAccount(username, password, "552", gender);
                        } else { showToast("❌ كلمة المرور غير صحيحة!", "#ff2a5f"); }
                    });
                } else {
                    let newUid = isAdmin ? "552" : Math.floor(10000000 + Math.random() * 90000000).toString();
                    createAccount(username, password, newUid, gender);
                }
            });
        }

        function createAccount(username, password, uid, gender) {
            let newData = { username: username, password: password, uid: uid, played: 0, wins: 0, gender: gender };
            db.ref('usernames/' + username).set(uid);
            db.ref('users/' + uid).set(newData);
            loginSuccess(uid, username, newData);
            showToast("✅ تم إنشاء الحساب بنجاح!");
        }

        function loginSuccess(uid, username, data) {
            currentUserId = uid; currentUsername = username; currentUserData = data;
            localStorage.setItem('xo_uid', uid); localStorage.setItem('xo_username', username);
            
            setOnlineStatus();
            
            document.getElementById('user-profile').classList.add('active');
            let devBadge = (username === "حمزة الحماده") ? `<span class="admin-badge">المطور</span>` : "";
            document.getElementById('display-name').innerHTML = `أهلاً، ${username} ${devBadge}`;
            document.getElementById('display-id').innerText = uid;
            document.getElementById('display-played').innerText = `🎮 لعب: ${data.played || 0}`;
            document.getElementById('display-wins').innerText = `🏆 فاز: ${data.wins || 0}`;
            
            let avatarSvg = data.gender === 'girl' ? 
                `<svg viewBox='0 0 100 100'><rect width='100' height='100' fill='#16162a'/><path d='M25 100 C 25 70, 35 60, 50 60 C 65 60, 75 70, 75 100 Z' fill='#ff2a5f'/><circle cx='50' cy='35' r='16' fill='#ffffff'/></svg>` : 
                `<svg viewBox='0 0 100 100'><rect width='100' height='100' fill='#16162a'/><path d='M15 100 C 15 60, 30 50, 50 50 C 70 50, 85 60, 85 100 Z' fill='#00f0ff'/><circle cx='50' cy='32' r='18' fill='#ffffff'/></svg>`;
            document.getElementById('user-avatar').src = "data:image/svg+xml;base64," + btoa(avatarSvg);

            setupRealtimeListeners();
            showSection('menu-section');
        }

        function logout() {
            db.ref('users/' + currentUserId + '/online').set(false).then(() => {
                localStorage.removeItem('xo_uid'); localStorage.removeItem('xo_username');
                location.reload();
            });
        }

        function copyMyID() { navigator.clipboard.writeText(currentUserId).then(() => showToast("📋 تم النسخ!")); }
        function goToLudo() { window.location.href = 'ludo.html'; }

        function setupRealtimeListeners() {
            db.ref('users/' + currentUserId + '/friends').on('value', snap => {
                const friends = snap.val();
                document.getElementById('friends-list').innerHTML = '';
                if(friends) {
                    for(let id in friends) {
                        let fName = typeof friends[id] === 'string' ? friends[id] : friends[id].name;
                        // استماع لحالة الأونلاين للصديق
                        db.ref('users/' + id + '/online').on('value', onlineSnap => {
                            let isFriendOnline = onlineSnap.val() === true;
                            let statusColor = isFriendOnline ? 'status-online' : 'status-offline';
                            let html = `
                            <div class="list-item" id="friend-box-${id}">
                                <span>
                                    <span class="status-dot ${statusColor}"></span>
                                    ${fName}
                                </span>
                                <button class="action-btn" onclick="inviteFriend('${id}', '${fName}')" style="background:${isFriendOnline?'#10b981':'#555'}; color:white;">دعوة</button>
                            </div>`;
                            
                            let existing = document.getElementById(`friend-box-${id}`);
                            if(existing) existing.outerHTML = html;
                            else document.getElementById('friends-list').innerHTML += html;
                        });
                    }
                } else {
                    document.getElementById('friends-list').innerHTML = '<div style="text-align:center;color:#666;padding:10px;">لا يوجد أصدقاء</div>';
                }
            });

            db.ref('users/' + currentUserId + '/game_invite').on('value', snap => {
                const invite = snap.val();
                if(invite && invite.gameId) {
                    window.pendingInviteId = invite.gameId;
                    document.getElementById('invite-msg').innerText = `${invite.senderName} يدعوك للعب XO!`;
                    document.getElementById('invite-modal').classList.add('active');
                } else { document.getElementById('invite-modal').classList.remove('active'); }
            });
        }

        function searchAndAddFriend() {
            const targetId = document.getElementById('search-id-input').value.trim();
            if(targetId === currentUserId || !targetId) return showToast("⚠️ بيانات غير صالحة!", "#ff2a5f");
            db.ref('users/' + targetId).once('value').then(snap => {
                if(snap.exists()) {
                    db.ref('users/' + currentUserId + '/friends/' + targetId).set({ name: snap.val().username });
                    db.ref('users/' + targetId + '/friends/' + currentUserId).set({ name: currentUserData.username });
                    showToast("✅ تمت الإضافة بنجاح!");
                } else { showToast("❌ اللاعب غير موجود!", "#ff2a5f"); }
            });
        }

        function inviteFriend(friendId, friendName) {
            db.ref('users/' + friendId + '/online').once('value').then(snap => {
                if(snap.val() !== true) {
                    showToast("⚠️ لا يمكن إرسال الدعوة، اللاعب ليس أونلاين!", "#ff2a5f");
                    return;
                }
                gameId = Math.random().toString(36).substring(2, 10);
                myRole = 'X'; isOnline = true;
                
                db.ref('games/' + gameId).set({
                    board: ["", "", "", "", "", "", "", "", ""], turn: 'X', winner: '', player2Joined: false,
                    hostName: currentUserData.username, guestName: friendName
                });
                db.ref('users/' + friendId + '/game_invite').set({ gameId: gameId, senderName: currentUserData.username });
                
                showSection('waiting-section');
                db.ref('games/' + gameId + '/player2Joined').on('value', snap => {
                    if(snap.val()) { db.ref('games/' + gameId + '/player2Joined').off(); startGameOnline(); }
                });
            });
        }

        function cancelInvite() { showSection('friends-section'); }
        function acceptGameInvite() {
            gameId = window.pendingInviteId; myRole = 'O'; isOnline = true;
            db.ref('games/' + gameId).update({ player2Joined: true, guestName: currentUserData.username });
            db.ref('users/' + currentUserId + '/game_invite').remove();
            document.getElementById('invite-modal').classList.remove('active');
            startGameOnline();
        }
        function rejectGameInvite() { db.ref('users/' + currentUserId + '/game_invite').remove(); }

        // Game Engine
        function startLocalGame() {
            isOnline = false; gameBoard = ["", "", "", "", "", "", "", "", ""]; isGameOver = false; localTurn = 'X';
            playerXName = currentUserData.username; playerOName = "المنافس";
            showSection('game-section'); document.getElementById('board').style.display = 'grid'; updateUI();
        }

        function startGameOnline() {
            showSection('game-section'); document.getElementById('board').style.display = 'grid';
            db.ref('games/' + gameId).on('value', snap => {
                let data = snap.val();
                if(data) {
                    gameBoard = data.board; isGameOver = data.winner !== '';
                    playerXName = data.hostName; playerOName = data.guestName;
                    updateUI(data.turn);
                    if(data.winner) handleWin(data.winner);
                } else { showToast("غادر الخصم اللعبة", "#ff2a5f"); exitGame(); }
            });
        }

        function makeMove(i) {
            if (isGameOver || gameBoard[i] !== "") return;
            if (isOnline) {
                db.ref('games/' + gameId).once('value').then(snap => {
                    let d = snap.val();
                    if(d.turn === myRole && d.board[i] === "") {
                        d.board[i] = myRole; d.turn = myRole === 'X' ? 'O' : 'X';
                        d.winner = checkWin(d.board) || '';
                        db.ref('games/' + gameId).update(d);
                    }
                });
            } else {
                gameBoard[i] = localTurn; let w = checkWin(gameBoard);
                if(w) { isGameOver = true; handleWin(w); } 
                else { localTurn = localTurn === 'X' ? 'O' : 'X'; updateUI(); }
            }
        }

        const winLines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        function checkWin(b) {
            for(let l of winLines) if(b[l[0]] && b[l[0]]===b[l[1]] && b[l[0]]===b[l[2]]) return b[l[0]];
            return b.includes("") ? null : 'Draw';
        }

        function updateUI(turn = localTurn) {
            document.querySelectorAll('.cell').forEach((c, i) => {
                c.innerHTML = gameBoard[i] ? `<span>${gameBoard[i]}</span>` : "";
                c.className = `cell ${gameBoard[i] ? gameBoard[i].toLowerCase() : ''}`;
            });
            document.getElementById('label-x').innerText = playerXName;
            document.getElementById('label-o').innerText = playerOName;
            document.getElementById('score-x').innerText = scores.X;
            document.getElementById('score-o').innerText = scores.O;
            
            if(!isGameOver) {
                let current = turn === 'X' ? playerXName : playerOName;
                document.getElementById('status-text').innerText = isOnline && turn !== myRole ? `انتظار ${current}...` : `دور: ${current}`;
            }
        }

        function handleWin(w) {
            if(w === 'Draw') { document.getElementById('status-text').innerText = "تعادل!"; scores.ties++; }
            else { 
                document.getElementById('status-text').innerText = `الفائز: ${w === 'X' ? playerXName : playerOName}!`;
                scores[w]++; confetti(); 
            }
            document.getElementById('reset-btn').style.display = (!isOnline || myRole === 'X') ? 'block' : 'none';
            updateUI();
        }

        function resetGame() {
            if(isOnline) db.ref('games/' + gameId).update({board: ["", "", "", "", "", "", "", "", ""], turn: 'X', winner: ''});
            else startLocalGame();
            document.getElementById('reset-btn').style.display = 'none';
        }

        function exitGame() { if(isOnline) db.ref('games/' + gameId).remove(); showSection('menu-section'); }
    </script>
</body>
</html>
