<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة X O أونلاين</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #ff5252; }
        .container {
            background: #2a2a40;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        button {
            background-color: #ff5252;
            color: white;
            border: none;
            padding: 15px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 90%;
            font-weight: bold;
        }
        button:hover { background-color: #ff1744; }
        
        /* Board Styles */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            display: none; /* مخفي في البداية */
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #3b3b58;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cell:hover { background-color: #4d4d73; }
        .cell.x { color: #ff5252; }
        .cell.o { color: #448aff; }
        
        /* UI Sections */
        #menu-section, #waiting-section, #game-section {
            display: none;
        }
        #menu-section.active, #waiting-section.active, #game-section.active {
            display: block;
        }
        .link-box {
            background: #1e1e2f;
            padding: 10px;
            border-radius: 5px;
            word-break: break-all;
            margin: 15px 0;
            border: 1px solid #448aff;
        }
        #status-text {
            font-size: 20px;
            margin: 15px 0;
            font-weight: bold;
        }
    </style>

    <!-- تضمين مكتبة Firebase الإصدار 8 (الأسسهل في التعامل مع ملف HTML واحد) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <h1>لعبة X O</h1>

        <!-- القائمة الرئيسية -->
        <div id="menu-section" class="active">
            <h2>اختر نوع اللعب</h2>
            <button onclick="startLocalGame()">لعب محلي (على نفس الجهاز)</button>
            <button onclick="hostGame()">لعب مع صديق (أونلاين)</button>
        </div>

        <!-- غرفة الانتظار (للمستضيف) -->
        <div id="waiting-section">
            <h2>في انتظار انضمام صديقك...</h2>
            <p>قم بنسخ هذا الرابط وإرساله لصديقك:</p>
            <div class="link-box" id="share-link"></div>
            <button onclick="copyLink()">نسخ الرابط</button>
        </div>

        <!-- ساحة اللعب -->
        <div id="game-section">
            <div id="status-text">انتظر...</div>
            <div id="role-text" style="margin-bottom:10px; color:#aaa;"></div>
            <div class="board" id="board">
                <!-- الخلايا -->
                <div class="cell" onclick="makeMove(0)"></div>
                <div class="cell" onclick="makeMove(1)"></div>
                <div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div>
                <div class="cell" onclick="makeMove(4)"></div>
                <div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div>
                <div class="cell" onclick="makeMove(7)"></div>
                <div class="cell" onclick="makeMove(8)"></div>
            </div>
            <button id="reset-btn" onclick="resetGame()" style="display:none; margin-top:20px;">لعب مرة أخرى</button>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDr0kbQDE90hhEMohV6X1b4ndu4L7uZz24",
            projectId: "mehamzaalanat",
            databaseURL: "https://mehamzaalanat-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "mehamzaalanat.firebasestorage.app",
            appId: "1:10248497310:android:bc2b88983738827f15338f"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // المتغيرات الأساسية
        let myRole = ''; // X أو O
        let gameId = '';
        let isOnline = false;
        let localTurn = 'X'; 
        let gameBoard = ["", "", "", "", "", "", "", "", ""];
        let isGameOver = false;

        // التحقق مما إذا كان اللاعب دخل من رابط دعوة
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('game');

        if (joinId) {
            joinGame(joinId);
        }

        // ---- واجهة المستخدم ----
        function showSection(sectionId) {
            document.getElementById('menu-section').classList.remove('active');
            document.getElementById('waiting-section').classList.remove('active');
            document.getElementById('game-section').classList.remove('active');
            document.getElementById(sectionId).classList.add('active');
        }

        // ---- اللعب المحلي (بدون إنترنت) ----
        function startLocalGame() {
            isOnline = false;
            myRole = 'All'; 
            gameBoard = ["", "", "", "", "", "", "", "", ""];
            isGameOver = false;
            localTurn = 'X';
            showSection('game-section');
            document.getElementById('board').style.display = 'grid';
            document.getElementById('role-text').innerText = "وضع اللعب المحلي";
            updateStatusText();
            renderBoard();
        }

        // ---- استضافة لعبة أونلاين ----
        function hostGame() {
            isOnline = true;
            myRole = 'X'; // المستضيف دائماً X
            gameId = Math.random().toString(36).substring(2, 8); // إنشاء كود عشوائي للغرفة

            // رفع بيانات الغرفة الأولية للقاعدة
            db.ref('games/' + gameId).set({
                board: ["", "", "", "", "", "", "", "", ""],
                turn: 'X',
                winner: '',
                player2Joined: false
            });

            // إنشاء وعرض الرابط
            let currentUrl = window.location.href.split('?')[0];
            let shareLink = currentUrl + "?game=" + gameId;
            document.getElementById('share-link').innerText = shareLink;
            showSection('waiting-section');

            // الاستماع لدخول اللاعب الثاني
            db.ref('games/' + gameId + '/player2Joined').on('value', (snapshot) => {
                if (snapshot.val() === true) {
                    startGameOnline();
                }
            });
        }

        // نسخ الرابط
        function copyLink() {
            const linkText = document.getElementById('share-link').innerText;
            navigator.clipboard.writeText(linkText).then(() => {
                alert("تم نسخ الرابط! أرسله لصديقك الآن.");
            });
        }

        // ---- الانضمام للعبة أونلاين ----
        function joinGame(id) {
            isOnline = true;
            myRole = 'O'; // الضيف دائماً O
            gameId = id;

            // إبلاغ القاعدة بأن اللاعب الثاني قد انضم
            db.ref('games/' + gameId).update({
                player2Joined: true
            });

            startGameOnline();
        }

        // ---- بدء اللعبة الأونلاين (للطرفين) ----
        function startGameOnline() {
            showSection('game-section');
            document.getElementById('board').style.display = 'grid';
            document.getElementById('role-text').innerText = `أنت تلعب كـ : ${myRole}`;
            
            // الاستماع المستمر لتغيرات اللوحة من قاعدة البيانات
            db.ref('games/' + gameId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    gameBoard = data.board;
                    isGameOver = data.winner !== '';
                    renderBoard();
                    
                    if (data.winner !== '') {
                        if (data.winner === 'Draw') {
                            document.getElementById('status-text').innerText = "التعادل!";
                        } else {
                            document.getElementById('status-text').innerText = `الفائز هو ${data.winner}!`;
                        }
                        document.getElementById('reset-btn').style.display = 'block';
                    } else {
                        document.getElementById('reset-btn').style.display = 'none';
                        if (data.turn === myRole) {
                            document.getElementById('status-text').innerText = "دورك الآن!";
                        } else {
                            document.getElementById('status-text').innerText = "دور صديقك...";
                        }
                    }
                }
            });
        }

        // ---- تنفيذ الحركة (الضغط على المربع) ----
        function makeMove(index) {
            if (isGameOver || gameBoard[index] !== "") return;

            if (isOnline) {
                // جلب حالة اللعبة للتأكد من الدور
                db.ref('games/' + gameId).once('value').then((snapshot) => {
                    let data = snapshot.val();
                    if (data.turn === myRole && data.board[index] === "" && data.winner === "") {
                        data.board[index] = myRole;
                        data.turn = myRole === 'X' ? 'O' : 'X';
                        
                        // فحص الفوز قبل إرسال البيانات
                        let winner = checkWin(data.board);
                        if (winner) data.winner = winner;

                        // تحديث القاعدة
                        db.ref('games/' + gameId).update(data);
                    }
                });
            } else {
                // منطق اللعب المحلي
                gameBoard[index] = localTurn;
                localTurn = localTurn === 'X' ? 'O' : 'X';
                let winner = checkWin(gameBoard);
                if (winner) {
                    isGameOver = true;
                    if (winner === 'Draw') document.getElementById('status-text').innerText = "التعادل!";
                    else document.getElementById('status-text').innerText = `الفائز هو ${winner}!`;
                    document.getElementById('reset-btn').style.display = 'block';
                } else {
                    updateStatusText();
                }
                renderBoard();
            }
        }

        // ---- رسم المربعات ----
        function renderBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                cell.innerText = gameBoard[index];
                cell.className = 'cell'; // إعادة تعيين الكلاس
                if (gameBoard[index] === 'X') cell.classList.add('x');
                if (gameBoard[index] === 'O') cell.classList.add('o');
            });
        }

        function updateStatusText() {
            if (!isOnline && !isGameOver) {
                document.getElementById('status-text').innerText = `دور اللاعب: ${localTurn}`;
            }
        }

        // ---- خوارزمية فحص الفوز ----
        function checkWin(board) {
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // أفقي
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // عمودي
                [0, 4, 8], [2, 4, 6]             // قطري
            ];

            for (let condition of winConditions) {
                let [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a]; // يرجع X أو O
                }
            }

            if (!board.includes("")) return 'Draw'; // تعادل
            return null;
        }

        // ---- إعادة اللعب ----
        function resetGame() {
            if (isOnline) {
                db.ref('games/' + gameId).update({
                    board: ["", "", "", "", "", "", "", "", ""],
                    turn: 'X',
                    winner: ''
                });
            } else {
                startLocalGame();
                document.getElementById('reset-btn').style.display = 'none';
            }
        }
    </script>
</body>
</html>
